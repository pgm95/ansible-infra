#:schema https://mise.jdx.dev/schema/mise.json

[env]
_.file = { path = "{{config_root}}/.secrets/dev.sops.yaml", redact = true }

# Proxmox
PVE_HOST_ADDR = "proxmox.home.arpa"
PVE_NODE_NAME = "proxmox"

# Terraform
TF_VAR_pve_download_storage = "local-btrfs"
TF_VAR_pve_node_name = "{{ env.PVE_NODE_NAME }}"
TF_VAR_pve_host_addr = "{{ env.PVE_HOST_ADDR }}"
PROXMOX_VE_ENDPOINT = "https://{{ env.PVE_HOST_ADDR }}:8006/"
