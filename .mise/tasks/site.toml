#:schema https://mise.jdx.dev/schema/mise-task.json

["site:deploy"]
description = " " # "Create and provision all hosts"
run = [
  "mise run tf:apply",
  "mise run lxc:deploy",
  "mise run vm:deploy",
  "mise run vps:deploy",
  "mise run swarm:deploy"
  ]

# ================================================================================

["lxc:deploy"]
description = " " # "Deploy LXC container to specific host(s)"
usage = '''
arg "[hosts]" help="Hostnames (e.g. test1,test2)"
arg "[tags]" help="Ansible tags (e.g. common,ssh,docker)"
'''
env = { DEPLOY_GROUP = "lxc" }
file = ".mise/scripts/deploy.sh"

["lxc:check"]
description = " " # "Dry-run LXC provisioning"
env = { DEPLOY_GROUP = "lxc", DEPLOY_INTERACTIVE = "false", DEPLOY_CHECK_MODE = "true" }
file = ".mise/scripts/deploy.sh"

# ================================================================================

["vm:deploy"]
description = " " # "Deploy VM to specific host(s)"
usage = '''
arg "[hosts]" help="Hostnames (e.g. vmtest1,vmtest2)"
arg "[tags]" help="Ansible tags (e.g. common,ssh,docker)"
'''
env = { DEPLOY_GROUP = "vm" }
file = ".mise/scripts/deploy.sh"

["vm:check"]
description = " " # "Dry run VM provisioning (check mode)"
env = { DEPLOY_GROUP = "vm", DEPLOY_INTERACTIVE = "false", DEPLOY_CHECK_MODE = "true" }
file = ".mise/scripts/deploy.sh"

# ================================================================================

["vps:deploy"]
description = " " # "Deploy VPS to specific host(s)"
usage = '''
arg "[hosts]" help="Hostnames (e.g. host1,host2)"
arg "[tags]" help="Ansible tags (e.g. common,network)"
'''
env = { DEPLOY_GROUP = "vps" }
file = ".mise/scripts/deploy.sh"

["vps:check"]
description = " " # "Dry-run VPS deployment"
env = { DEPLOY_GROUP = "vps", DEPLOY_INTERACTIVE = "false", DEPLOY_CHECK_MODE = "true" }
file = ".mise/scripts/deploy.sh"

["vps:first-run"]
description = " " # "First-time deployment with password authentication"
env = { VPS_ADDR = "{{ env.VPS_PUBLIC_IP }}" }
run = "ansible-playbook ansible/playbooks/vps.yml --ask-pass --user root"
