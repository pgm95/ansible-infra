#:schema https://mise.jdx.dev/schema/mise-task.json
#:tombi schema.strict = false

["swarm:deploy"]
description = " " # "Bootstrap/update Docker Swarm cluster"
run = "ansible-playbook playbooks/swarm.yml"

["swarm:check"]
description = " " # "Dry-run Swarm bootstrap"
run = "ansible-playbook playbooks/swarm.yml --check --diff"

["swarm:status"]
description = " " # "Display Swarm cluster status"
env.ANSIBLE_STDOUT_CALLBACK = "json"
env.ANSIBLE_CALLBACKS_ENABLED = "default"
run = """
#!/usr/bin/env bash
ansible-playbook playbooks/swarm.yml --tags status 2>/dev/null \
  | jq -r '.plays[].tasks[]
    | select(.task.name == "Display cluster summary")
    | .hosts | to_entries[]
    | select(.value.msg != null)
    | .value.msg' 2>/dev/null
"""

["swarm:reset"]
description = " " # "Destroy Swarm cluster (DESTRUCTIVE)"
run = "ansible-playbook playbooks/swarm.yml --tags reset"
