#:schema https://mise.jdx.dev/schema/mise-task.json

["tf:plan"]
description = " " # Preview infrastructure changes
dir = "{{config_root}}/terraform"
run = "terraform plan"

["tf:apply"]
description = " " # Apply infrastructure changes
dir = "{{config_root}}/terraform"
run = "terraform apply -auto-approve"

["tf:destroy"]
description = " " # Destroy all infrastructure (DESTRUCTIVE)
dir = "{{config_root}}/terraform"
run = "terraform destroy"

["tf:state"]
description = " " # Show Terraform state
dir = "{{config_root}}/terraform"
run = "terraform state list"

["tf:output"]
description = " " # Show Terraform outputs
dir = "{{config_root}}/terraform"
run = "terraform output"
