#:schema https://mise.jdx.dev/schema/mise.json

############################ SETTINGS ############################
[settings]
experimental = true
auto_install = false
python.uv_venv_auto = true
sops.age_key_file = "age.key"
unix_default_file_shell_args = "bash -o errexit -o nounset -o pipefail"
unix_default_inline_shell_args = "bash -c -o errexit -o nounset -o pipefail"

[tools]
"aqua:jdx/usage" = "latest"
"aqua:astral-sh/uv" = "latest"
"aqua:getsops/sops" = "latest"
"aqua:FiloSottile/age" = "latest"
"aqua:pre-commit/pre-commit" = "latest"
"aqua:hashicorp/terraform" = "latest"

[tools."pipx:ansible-core"]
version = "2.20.4"
uvx_args = "--with requests --with netaddr --with dnspython --with passlib --with proxmoxer --with-executables-from ansible-lint,ansible-navigator,molecule"

[env]
MISE_ENV = "{{ mise_env | first }}"
PROJECT_CONFIGS_DIR = "{{config_root}}/.config"
PROJECT_SECRETS_DIR = "{{config_root}}/.secrets"

# Tooling configs
YAMLLINT_CONFIG_FILE = "{{ env.PROJECT_CONFIGS_DIR }}/yamllint.yml"
SOPS_AGE_KEY_FILE = "{{config_root}}/age.key"
SOPS_CONFIG = "{{ env.PROJECT_CONFIGS_DIR }}/sops.yaml"

# Shared secrets
_.file = { path = "{{ env.PROJECT_SECRETS_DIR }}/shared.sops.yaml", redact = true }

# Ansible
ANSIBLE_HOME = "{{config_root}}/.ansible"
ANSIBLE_CONFIG = "{{config_root}}/ansible/ansible.cfg"
ANSIBLE_INVENTORY = "{{config_root}}/ansible/hosts.yml"
ANSIBLE_ROLES_PATH = "{{config_root}}/ansible/roles"
ANSIBLE_CACHE_PLUGIN_CONNECTION = "{{ env.ANSIBLE_HOME }}/facts"

# Terraform
TF_WORKSPACE = "{{ mise_env | first }}"
TF_VAR_universal_pass = "{{ env.UNIVERSAL_PASS }}"
TF_VAR_ssh_authorized_keys = "{{ env.SSH_AUTHORIZED_KEYS }}"
PROXMOX_VE_PASSWORD = "{{ env.UNIVERSAL_PASS }}"
PROXMOX_VE_USERNAME = "root@pam"

[task_config]
includes = [
    ".mise/tasks/site.toml",
    ".mise/tasks/swarm.toml",
    ".mise/tasks/sops.toml",
    ".mise/tasks/terraform.toml"
]

############################ TASKS ############################
[tasks."env:setup"]
description = " " # Complete environment setup via mise
run = """
mise trust 2>/dev/null || true
mise install
mkdir -p $ANSIBLE_HOME/collections
mise exec -- ansible-galaxy collection install -r ansible/requirements.yml --force -p $ANSIBLE_HOME/collections
mise exec -- pre-commit install --config $PROJECT_CONFIGS_DIR/pre-commit.yaml
cd terraform
mise exec -- terraform init
mise exec -- terraform workspace new \"$TF_WORKSPACE\" || true
"""

[tasks."env:clean"]
description = " " # Clean up environment and cache
usage = 'flag "--uninstall" help="Also uninstall all mise tools"'
run = '''
#!/usr/bin/env bash
[[ "${usage_uninstall:-}" == "true" ]] && mise uninstall --all
find . \( -name "*.tmp" -o -name "*.log" -o -name "__pycache__" -o -name "*.pyc" -o -name "*.egg-info" -o -name ".cache" -o -name "*_cache" -o -name ".venv" -o -name ".ansible" -o -name ".terraform" \) -exec rm -rf {} + || true
'''

[tasks."validate"]
description = " " # Run all pre-commit hooks
run = "pre-commit run --config $PROJECT_CONFIGS_DIR/pre-commit.yaml --all-files"

[tasks."info"]
description = " " # Gather and display system facts (includes VMs/LXCs)
env.ANSIBLE_CALLBACKS_ENABLED = "default"
run = """
#!/usr/bin/env bash
ansible-playbook ansible/playbooks/get-facts.yml 2>&1 | \
  sed $'s/\\x1b\\[[0-9;]*m//g' | \
  sed -n '/^        ======/,/^TASK\\|^PLAY/p' | \
  grep -v '^TASK\\|^PLAY' | \
  sed 's/^        //' || true
"""
