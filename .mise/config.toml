#:schema https://mise.jdx.dev/schema/mise.json

############################ SETTINGS ############################
[settings]
experimental = true
auto_install = false
python.uv_venv_auto = true
unix_default_file_shell_args = "bash -o errexit -o nounset -o pipefail"
unix_default_inline_shell_args = "bash -c -o errexit -o nounset -o pipefail"

[tools]
"aqua:jdx/usage" = "latest"
"aqua:astral-sh/uv" = "latest"
"aqua:koalaman/shellcheck" = "latest"
"aqua:pre-commit/pre-commit" = "latest"

[tools."pipx:ansible-core"]
version = "latest"
uvx_args = "--with requests --with netaddr --with dnspython --with passlib --with proxmoxer --with-executables-from ansible-lint,ansible-navigator,molecule"

[env]
MISE_ENV = "{{ mise_env | first }}"
PROJECT_CONFIGS_DIR = "{{config_root}}/.config"
PROJECT_SECRETS_DIR = "{{config_root}}/.secrets"
_.file = "{{ env.PROJECT_SECRETS_DIR }}/.env"
YAMLLINT_CONFIG_FILE = "{{ env.PROJECT_CONFIGS_DIR }}/yamllint.yml"

ANSIBLE_HOME = "{{config_root}}/.ansible"
ANSIBLE_LOCAL_TEMP = "{{ env.ANSIBLE_HOME }}/tmp"
ANSIBLE_COLLECTIONS_PATH = "{{ env.ANSIBLE_HOME }}/collections"
ANSIBLE_GALAXY_CACHE_DIR = "{{ env.ANSIBLE_HOME }}/galaxy_cache"
ANSIBLE_CACHE_PLUGIN_CONNECTION = "{{ env.ANSIBLE_HOME }}/facts"
ANSIBLE_CONFIG = "{{ env.PROJECT_CONFIGS_DIR }}/ansible.cfg"
ANSIBLE_ROLES_PATH = "{{config_root}}/roles"
ANSIBLE_INVENTORY = "{{config_root}}/inventory"
ANSIBLE_VAULT_PASSWORD_FILE = "{{ env.PROJECT_SECRETS_DIR }}/vault-{{ env.MISE_ENV }}.key"

[hooks]
enter = "ln -sf ${PROJECT_SECRETS_DIR}/vault-${MISE_ENV}.yml inventory/group_vars/all/vault.yml"

[task_config]
includes = [
    ".mise/tasks/lxc.toml",
    ".mise/tasks/vm.toml",
    ".mise/tasks/vps.toml",
    ".mise/tasks/swarm.toml"
]

############################ TASKS ############################
[tasks."env:setup"]
description = " " # Complete environment setup via mise
run = """
mise trust 2>/dev/null || true
mise install
mkdir -p .ansible/collections
mise exec -- ansible-galaxy collection install -r $PROJECT_CONFIGS_DIR/requirements.yml --force -p .ansible/collections
mise exec -- pre-commit install --config $PROJECT_CONFIGS_DIR/pre-commit.yaml
"""

[tasks."env:clean"]
description = " " # Clean up environment and cache
usage = 'flag "--uninstall" help="Also uninstall all mise tools"'
run = '''
#!/usr/bin/env bash
[[ "${usage_uninstall:-}" == "true" ]] && mise uninstall --all
find . \( -name "*.tmp" -o -name "*.log" -o -name "__pycache__" -o -name "*.pyc" -o -name "*.egg-info" -o -name ".cache" -o -name "*_cache" -o -name ".venv" -o -name '.ansible' \) -exec rm -rf {} + || true
'''

[tasks."validate"]
description = " " # Run all pre-commit hooks
run = "pre-commit run --config $PROJECT_CONFIGS_DIR/pre-commit.yaml --all-files"

[tasks."info"]
description = " " # Gather and display system facts (includes VMs/LXCs)
env.ANSIBLE_CALLBACKS_ENABLED = "default"
run = """
ansible-playbook playbooks/get-facts.yml 2>&1 | \
  grep -E '^\\s+\"msg\":' | \
  sed 's/^[[:space:]]*\"msg\": \"//' | \
  sed 's/\"$//' | \
  sed 's/\\\\n/\\n/g' | \
  while IFS= read -r line; do printf '%b\\n' \"$line\"; done || true
"""

[tasks."vault"]
description = " " # View/edit vault file in VSCode
env.EDITOR = "code --wait"
run = "ansible-vault edit $PROJECT_SECRETS_DIR/vault-${MISE_ENV}.yml"
