---
# ============================================================================
# Global Variables - Applied to ALL Hosts
# ============================================================================
# These are universal settings that apply to every host type.
# Role-specific defaults are in roles/*/defaults/main.yml
# Host-type-specific preferences are in group_vars/{hosttype}.yml
# Host-specific overrides are in host_vars/{hosttype}/{hostname}.yml
# ============================================================================

# Connection Settings
# NOTE: ansible_connection is set per-host in inventory/hosts.yml
# - localhost: local
# - remote hosts: ssh (default)
ansible_user: "{{ lookup('env', 'ANSIBLE_USER') | default('root', true) }}"
ansible_python_interpreter: /usr/bin/python3

# System Settings
system_timezone: UTC
net_iface_configure: false
hostname_configure: false
users_sudo_nopasswd: false
qemu_agent_enabled: false
swap_disable: true

# Dotfiles Repo Configuration
dotfiles_enabled: false
dotfiles_repo_branch: "main"
dotfiles_repo_url: "{{ vault_github_dotfiles_url }}"

# Application Configuration
packages_install_shell: false # (boolean) Install shell utilities
packages_install_network: false # (boolean) Install network utilities

# Tailscale OAuth Credentials
# Both point to the same OAuth client (has auth_keys + devices write scopes)
# Actual secret is per-environment in inventory/{env}/group_vars/all/vault.yml
tailscale_oauth_authkeys: "{{ vault_ts_oauth_key }}"
tailscale_oauth_devices: "{{ vault_ts_oauth_key }}"

# ============================================================================
# Proxmox Infrastructure Settings
# ============================================================================
# DNS domain used for VM/LXC hostname resolution
# Used by playbooks to construct ansible_host for SSH connections
proxmox_dns_domain: "home.arpa"
