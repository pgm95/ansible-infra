---
# Applied to all VMs via dynamic inventory (groups: ['vm'])

# SSH Connection Settings (required for provisioning)
ansible_connection: ssh
ansible_user: root

# VM Basics
vm_vmid: "" # (string) VM ID (100-999999999), empty = auto-assign next available
vm_hostname: "" # (string) VM hostname (Proxmox UI name, DNS, SSH, cloud-init), empty = inventory_hostname
vm_description: "" # (string) VM description shown in Proxmox
vm_tags: "" # (string) Semicolon-separated tags for organization
vm_template: false # (boolean) Mark as template (prevents starting)
vm_protection: false # (boolean) Prevent accidental removal
vm_start_on_boot: false # (boolean) Start VM when Proxmox boots
vm_startup_order: 0 # (integer) Boot priority (0=any, 1-999=ordered)
vm_pool: "" # (string) Resource pool assignment
vm_ostype: "l26" # (string) OS type: l24, l26, other, solaris, w2k, w2k3, w2k8, win7, win8, win10, win11, wvista, wxp

# CPU & Memory Resources
vm_cores: 2 # (integer) Number of CPU cores per socket
vm_sockets: 1 # (integer) Number of CPU sockets
vm_cpu_type: "host" # (string) CPU emulation type (host, kvm64, qemu64, etc.)
vm_memory: 2048 # (integer) RAM in MiB
vm_balloon: 512 # (integer) Minimum RAM for memory ballooning (0=disable)

# Storage Configuration
# First disk (index 0) is ALWAYS the boot disk - receives cloud image import to scsi0.
# Additional disks (index 1+) use their specified bus type with auto-indexed identifiers.
# All disks inherit unspecified properties from vm_default_storage
vm_default_storage: "" # (string) Default storage pool for all disks, empty = auto-select
vm_scsi_controller: "virtio-scsi-single" # (string) SCSI controller: lsi, lsi53c810, megasas, pvscsi, virtio-scsi-pci, virtio-scsi-single
vm_disks:
  - size: 16 # (integer) REQUIRED - Disk size in GiB
    storage: "" # (string) Storage pool, empty = vm_default_storage
    bus: "scsi" # (string) Bus type: scsi, sata, virtio, ide (ignored for boot disk, always scsi0)
    ssd: true # (boolean) SSD emulation for better guest performance
    cache: "none" # (string) Cache mode: none (safe), writethrough, writeback, directsync, unsafe
    backup: true # (boolean) Include disk in Proxmox backup jobs
    discard: "on" # (string) TRIM/discard support: on, ignore
    iothread: true # (boolean) Dedicated IO thread per disk
    mp: "" # (string) Guest mount point for cloud-init disk setup (additional disks only, boot disk should never have this)

# Cloud Image Management
vm_cloud_image_enabled: true # (boolean) Enable automatic cloud image download
vm_cloud_image_url: "https://cdimage.debian.org/images/cloud/trixie/latest/debian-13-genericcloud-amd64.raw" # (string) Full URL to cloud image
vm_cloud_image_cache_dir: "/var/lib/pve/local-btrfs/import" # (string) Directory to cache downloaded images

# Network Configuration
vm_net_model: "virtio" # (string) Network card model: e1000, e1000e, rtl8139, virtio
vm_net_bridge: "vmbr0" # (string) Network bridge on Proxmox host
vm_net_vlan: "" # (string) VLAN tag (empty = untagged)
vm_net_mac: "" # (string) MAC address (empty = auto-generate)
vm_net_mtu: "" # (string) MTU size (empty = default 1500)
vm_net_firewall: false # (boolean) Enable Proxmox firewall for this interface
vm_net_link_down: false # (boolean) Start with network link disabled

# Cloud-Init Configuration
vm_cloudinit_enabled: true # (boolean) Enable cloud-init support (required for networking)
vm_cloudinit_type: "nocloud" # (string) Cloud-init datasource: nocloud, configdrive2
vm_cloudinit_user: "root" # (string) Default username created by cloud-init
vm_cloudinit_password: "{{ lookup('env', 'UNIVERSAL_PASS') }}" # (string) User password
vm_cloudinit_upgrade: false # (boolean) Run package upgrade on first boot (slower)
vm_cloudinit_ip: "dhcp" # (string) IPv4 config: "dhcp" or "192.168.1.100/24" (CIDR notation)
vm_cloudinit_gateway: "" # (string) IPv4 gateway (required for static IP): "192.168.1.1"
vm_cloudinit_ip6: "" # (string) IPv6 config: "dhcp", "auto", "2001:db8::1/64", or "" (omit parameter)
vm_cloudinit_nameserver: "" # (string) DNS nameserver for cloud-init (empty = use DHCP provided)
vm_cloudinit_searchdomain: "" # (string) DNS search domain for cloud-init (empty = use DHCP provided)

# Custom Vendor Data (--cicustom vendor)
vm_cicustom_vendor_enabled: false # (boolean) Enable custom vendor.yml for pre-boot configuration (DNS, QEMU agent, etc.)
vm_cicustom_vendor_storage: "" # (string) Proxmox storage name (REQUIRED when enabled): "local", "pve-storage", etc.
vm_cicustom_vendor_path: "snippets" # (string) Path within storage for vendor.yml file

# Boot & BIOS Configuration
vm_bios_type: "seabios" # (string) BIOS type: seabios (legacy BIOS)
vm_machine_type: "q35" # (string) QEMU machine type: q35 (modern), i440fx (legacy)
vm_boot_order: "scsi0" # (string) Boot device order (scsi0=primary disk)
vm_reboot_allowed: true # (boolean) Allow guest-initiated reboot

# Display & Input
vm_vga_type: "std" # (string) VGA adapter: cirrus, none, qxl, qxl2, qxl3, qxl4, serial0, serial1, serial2, serial3, std, virtio, virtio-gl, vmware
vm_keyboard_layout: "en-us" # (string) Keyboard layout
vm_tablet_enabled: true # (boolean) Enable USB tablet for better mouse integration

# Advanced Features
vm_kvm_enabled: true # (boolean) Enable KVM hardware virtualization
vm_acpi_enabled: true # (boolean) Enable ACPI support
vm_agent_enabled: true # (boolean) Enable QEMU guest agent (requires qemu-guest-agent package)
vm_hotplug_features: "network,disk,usb" # (string) Comma-separated hotplug features

# Role Operational Configuration
vm_temp_dir: "/root/.ansible/vm" # (string) Directory for temporary files (SSH keys, logs, scripts)
vm_start_after_create: true # (boolean) Start VM immediately after creation
vm_wait_for_boot: true # (boolean) Wait for VM to fully boot before proceeding
vm_ip_discovery_method: "dns" # (string) IP discovery method: dns (via hostname), agent (via qemu-agent)
vm_ip_discovery_retries: 20 # (integer) Number of retry attempts for IP discovery
vm_ip_discovery_delay: 5 # (integer) Seconds between IP discovery retries
