[defaults]
forks = 5
remote_tmp = ~/.ansible/tmp
interpreter_python = auto_silent
# Inventory and vault_password_file are managed by mise via environment variables
# Security checks are disabled for dynamic inventory (LXC/VM hosts have unknown keys until first connection)
# Mitigated by: trusted network, pre-deployed SSH keys via vault/cloud-init
host_key_checking = False
retry_files_enabled = False
deprecation_warnings = False

# Performance
gathering = smart
fact_caching = jsonfile
fact_caching_timeout = 86400

# Output
result_format = yaml
stdout_callback = default
# bin_ansible_callbacks = True
# callbacks_enabled = timer, profile_tasks, profile_roles

[ssh_connection]
pipelining = True
control_path = /tmp/ansible-%%h-%%p-%%r
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
