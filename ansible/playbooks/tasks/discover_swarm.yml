---
# ============================================================================
# Discover Swarm-Enabled Hosts
# ============================================================================
# Finds hosts with docker_swarm_enabled: true across static inventory groups.
# Registers them to the 'swarm' group sorted for bootstrap order (init first).
#
# All host_vars are auto-loaded by Ansible from static inventory - no file
# scanning or include_vars needed.
# ============================================================================

# ============================================================================
# Phase 1: Filter Swarm-Enabled Hosts from Inventory
# ============================================================================

- name: Filter swarm-enabled hosts
  ansible.builtin.set_fact:
    _swarm_hosts: >-
      {{ _swarm_hosts | default([]) + [{'name': item}] }}
  loop: "{{ groups['lxc'] | default([]) + groups['vm'] | default([]) + groups['vps'] | default([]) }}"
  when:
    - hostvars[item].docker_swarm_enabled | default(false)
    - hostvars[item].env_scope | default(lookup('env', 'MISE_ENV')) == lookup('env', 'MISE_ENV')

- name: Display discovered swarm hosts
  ansible.builtin.debug:
    msg: |
      Discovered {{ _swarm_hosts | default([]) | length }} swarm host(s):
      {% for host in _swarm_hosts | default([]) %}
      {% set role = hostvars[host.name].docker_swarm_role | default('worker') %}
      {% set init = ' [INIT]' if hostvars[host.name].docker_swarm_init | default(false) else '' %}
        - {{ host.name }} ({{ role }}{{ init }})
      {% endfor %}
  when: _swarm_hosts | default([]) | length > 0

- name: No swarm hosts found
  ansible.builtin.debug:
    msg: >-
      No hosts found with docker_swarm_enabled: true.
      Add docker_swarm_enabled: true to the host's host_vars file.
  when: _swarm_hosts | default([]) | length == 0

# ============================================================================
# Phase 2: Validate, Sort, and Register Swarm Hosts
# ============================================================================

- name: Identify init node
  ansible.builtin.set_fact:
    _init_hosts: >-
      {{ _init_hosts | default([]) + (
           [item] if (hostvars[item.name].docker_swarm_init | default(false)) else []
         ) }}
  loop: "{{ _swarm_hosts | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when: _swarm_hosts | default([]) | length > 0

- name: Validate exactly one init node exists
  ansible.builtin.assert:
    that:
      - _init_hosts | length == 1
    fail_msg: >-
      Exactly ONE host must have docker_swarm_init: true.
      Found: {{ _init_hosts | length }}.
    success_msg: "Init node: {{ _init_hosts[0].name }}"
  when: _swarm_hosts | default([]) | length > 0

- name: Validate init node is a manager
  ansible.builtin.assert:
    that:
      - hostvars[_init_hosts[0].name].docker_swarm_role | default('worker') == 'manager'
    fail_msg: >-
      Init node must be a manager.
      {{ _init_hosts[0].name }} has docker_swarm_init: true
      but docker_swarm_role: {{ hostvars[_init_hosts[0].name].docker_swarm_role | default('worker') }}.
      Set docker_swarm_role: manager on the init node in host_vars.
    success_msg: "Init node {{ _init_hosts[0].name }} is a manager"
  when: _swarm_hosts | default([]) | length > 0

- name: Count managers
  ansible.builtin.set_fact:
    _manager_count: >-
      {{ _swarm_hosts | default([])
         | map(attribute='name')
         | map('extract', hostvars, 'docker_swarm_role')
         | map('default', 'worker')
         | select('equalto', 'manager')
         | list | length }}
  when: _swarm_hosts | default([]) | length > 0

- name: Validate at least one manager exists
  ansible.builtin.assert:
    that:
      - _manager_count | int >= 1
    fail_msg: "At least one host must have docker_swarm_role: manager"
    success_msg: "Manager count: {{ _manager_count }}"
  when: _swarm_hosts | default([]) | length > 0

- name: Store init node reference on localhost
  ansible.builtin.set_fact:
    swarm_init_host: "{{ _init_hosts[0].name }}"
  when: _swarm_hosts | default([]) | length > 0

- name: Sort hosts for bootstrap order (init first)
  ansible.builtin.set_fact:
    _swarm_hosts_sorted: >-
      {{ _init_hosts +
         (_swarm_hosts | rejectattr('name', 'equalto', _init_hosts[0].name) | list) }}
  when: _swarm_hosts | default([]) | length > 0

- name: Register swarm hosts dynamically
  ansible.builtin.add_host:
    name: "{{ item.name }}"
    groups: swarm
    _swarm_init_host: "{{ _init_hosts[0].name }}"
  loop: "{{ _swarm_hosts_sorted | default([]) }}"
  loop_control:
    label: "{{ item.name }} ({{ hostvars[item.name].docker_swarm_role | default('worker') }})"
  when: _swarm_hosts_sorted | default([]) | length > 0

- name: Display summary
  ansible.builtin.debug:
    msg: |
      Swarm group populated: {{ groups['swarm'] | default([]) | join(', ') }}
      Init node: {{ swarm_init_host }}
      Managers: {{ _manager_count }}
      Workers: {{ (_swarm_hosts | length) - (_manager_count | int) }}
  when: _swarm_hosts | default([]) | length > 0
