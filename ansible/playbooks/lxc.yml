---
# LXC Provisioning Playbook
#
# Provisions LXC containers via SSH with base system and applications.
# Guest lifecycle (create/destroy) is managed by Terraform.

- name: Provision LXC Containers
  hosts: lxc
  gather_facts: false
  pre_tasks:
    - name: Filter by environment
      ansible.builtin.import_tasks: tasks/filter_env.yml

    - name: Gather facts after environment filter
      ansible.builtin.setup:
      tags: [always]
  roles:
    - role: common/ssh
      tags: [common, ssh]
    - role: common/users
      tags: [common, users]
      when: users_list is defined and users_list | length > 0
    - role: common/packages
      tags: [common, packages]
    - role: common/dotfiles
      tags: [common, dotfiles]
      when: dotfiles_enabled
    - role: applications/tailscale
      tags: [application, tailscale, vpn]
      when:
        - not ansible_check_mode
        - tailscale_enabled
    - role: applications/docker
      tags: [application, docker]
      when:
        - docker_enabled
    - role: applications/samba
      tags: [application, samba]
      when:
        - samba_enabled
