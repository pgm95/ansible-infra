---
# VPS Deployment Playbook
#
# Provisions VPS/bare-metal servers with base system and applications.
# Role order matters:
#   - users + ssh first so subsequent roles can authenticate over SSH and
#     so any user-keyed deployment (e.g. dotfiles rsync) has keys in place
#   - hostname before tailscale so the device registers with the right name
#   - network/interface late so a misapplied IP change can't break earlier roles

- name: Setup VPS
  hosts: vps
  become: true
  gather_facts: false # Gather selectively for performance

  pre_tasks:
    - name: Filter by environment
      ansible.builtin.import_tasks: tasks/filter_env.yml
    - name: Gather facts for network and system configuration
      ansible.builtin.setup:
      when: >
        'interface' in ansible_run_tags or
        'hostname' in ansible_run_tags or
        'tailscale' in ansible_run_tags or
        'all' in ansible_run_tags
      tags: ["always"]
    - name: Display user configuration status
      ansible.builtin.debug:
        msg: >-
          {{ 'Will create ' + (users_list | length | string) + ' user(s)'
             if (users_list is defined and users_list | length > 0)
             else 'No users configured - root-only system' }}
      tags: ["always"]

  roles:
    - role: common/users
      tags: [users]
      when: users_list is defined and users_list | length > 0
    - role: common/ssh
      tags: [ssh]
    - role: common/hostname
      tags: [hostname]
      when: hostname_configure
    - role: common/packages
      tags: [packages]
    - role: common/swap
      tags: [swap]
    - role: common/dotfiles
      tags: [dotfiles]
      when: dotfiles_enabled
    - role: network/dns
      tags: [dns]
    - role: network/ntp
      tags: [ntp]
    - role: network/interface
      tags: [interface]
      when: net_iface_configure
    - role: applications/tailscale
      tags: [tailscale]
      when:
        - not ansible_check_mode # Skip in check mode due to collection limitation
        - tailscale_enabled
    - role: applications/docker
      tags: [docker]
      when:
        - docker_enabled
    - role: applications/samba
      tags: [samba]
      when:
        - samba_enabled
