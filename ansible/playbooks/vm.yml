---
# VM Provisioning Playbook
#
# Provisions VMs via SSH with base system and applications.
# Guest lifecycle (create/destroy) is managed by Terraform.

- name: Provision VMs
  hosts: vm
  gather_facts: false

  pre_tasks:
    - name: Filter by environment
      ansible.builtin.import_tasks: tasks/filter_env.yml
    - name: Gather facts after environment filter
      ansible.builtin.setup:
      tags: [always]

  roles:
    - role: common/users
      tags: [users]
      when: users_list is defined and users_list | length > 0
    - role: common/ssh
      tags: [ssh]
    - role: common/packages
      tags: [packages]
    - role: network/dns
      tags: [dns]
    - role: network/ntp
      tags: [ntp]
    - role: common/dotfiles
      tags: [dotfiles]
      when: dotfiles_enabled
    - role: applications/tailscale
      tags: [tailscale]
      when:
        - not ansible_check_mode
        - tailscale_enabled
    - role: applications/docker
      tags: [docker]
      when: docker_enabled
    - role: applications/samba
      tags: [samba]
      when: samba_enabled
