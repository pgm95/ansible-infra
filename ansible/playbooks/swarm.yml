---
# Docker Swarm Orchestration Playbook
#
# Bootstraps and tears down Docker Swarm clusters on provisioned hosts.
#
# Prerequisites:
#   - Hosts provisioned via lxc.yml/vm.yml/vps.yml with docker_enabled: true
#   - At least one host has docker_swarm_enabled: true and docker_swarm_role: manager
#   - Exactly ONE manager has docker_swarm_init: true

# PLAY 1: Discover swarm-enabled hosts, validate cluster topology,
# and register hosts to the dynamic 'swarm' group in order (init first).
# Operates on inventory metadata only; reachability is enforced downstream.
- name: Discover Swarm Hosts
  hosts: localhost
  connection: local
  gather_facts: false
  tags: ["always"]

  tasks:
    - name: Filter swarm-enabled hosts (env_scope-aware)
      ansible.builtin.set_fact:
        _swarm_hosts: "{{ _swarm_hosts | default([]) + [item] }}"
      loop: "{{ groups['lxc'] | default([]) + groups['vm'] | default([]) + groups['vps'] | default([]) }}"
      when:
        - hostvars[item].docker_swarm_enabled | default(false)
        - (hostvars[item].env_scope | default(_mise_env)) == _mise_env
      vars:
        _mise_env: "{{ lookup('env', 'MISE_ENV') }}"
    - name: Fail if no swarm hosts found
      ansible.builtin.fail:
        msg: >-
          No hosts with docker_swarm_enabled: true match env_scope={{ lookup('env', 'MISE_ENV') }}.
          Set docker_swarm_enabled: true (and env_scope if filtered) on a host's
          host_vars file.
      when: _swarm_hosts | default([]) | length == 0
    - name: Compute swarm topology
      ansible.builtin.set_fact:
        _init_hosts: >-
          {{ _swarm_hosts
             | map('extract', hostvars)
             | selectattr('docker_swarm_init', 'defined')
             | selectattr('docker_swarm_init')
             | map(attribute='inventory_hostname')
             | list }}
        _manager_count: >-
          {{ _swarm_hosts
             | map('extract', hostvars, 'docker_swarm_role')
             | map('default', 'worker')
             | select('equalto', 'manager')
             | list | length }}
    - name: Validate swarm topology
      ansible.builtin.assert:
        that:
          - _init_hosts | length == 1
          - hostvars[_init_hosts[0]].docker_swarm_role | default('worker') == 'manager'
          - _manager_count | int >= 1
        fail_msg: >-
          Invalid swarm topology. Required: exactly ONE host with
          docker_swarm_init: true and docker_swarm_role: manager, plus at least
          one host (total) with docker_swarm_role: manager.
          Got: {{ _init_hosts | length }} init hosts, {{ _manager_count }} managers.
        success_msg: "Init: {{ _init_hosts[0] }} | Managers: {{ _manager_count }}"
        quiet: true
    - name: Register swarm hosts (init first)
      ansible.builtin.add_host:
        name: "{{ item }}"
        groups: swarm
      loop: "{{ _init_hosts + (_swarm_hosts | reject('in', _init_hosts) | list) }}"
      loop_control:
        label: "{{ item }} ({{ hostvars[item].docker_swarm_role | default('worker') }})"
    - name: Display summary
      ansible.builtin.debug:
        msg: |
          Swarm group ({{ _swarm_hosts | length }} hosts; managers={{ _manager_count }}):
          {% for host in (_init_hosts + (_swarm_hosts | reject('in', _init_hosts) | list)) %}
          {%   set role = hostvars[host].docker_swarm_role | default('worker') %}
          {%   set init = ' [INIT]' if hostvars[host].docker_swarm_init | default(false) else '' %}
            - {{ host }} ({{ role }}{{ init }})
          {% endfor %}

# PLAY 2: Bootstrap. serial:1 preserves Raft consensus during init/joins.
- name: Bootstrap Swarm Cluster
  hosts: swarm
  gather_facts: true
  serial: 1

  tasks:
    - name: Include swarm bootstrap tasks
      ansible.builtin.include_role:
        name: applications/docker
        tasks_from: swarm_bootstrap

# PLAY 3: Display cluster status. Also surfaces non-Ready nodes
- name: Display Cluster Status
  hosts: localhost
  gather_facts: false
  tags: ["status"]

  tasks:
    - name: Get swarm cluster information
      community.docker.docker_swarm_info:
        nodes: true
      register: _cluster_info
      delegate_to: "{{ _init_hosts[0] }}"
    - name: Display cluster summary
      vars:
        _nodes: "{{ _cluster_info.nodes | default([]) }}"
        _managers: "{{ _nodes | selectattr('ManagerStatus') | list }}"
      ansible.builtin.debug:
        msg: |
          Docker Swarm Cluster
          Cluster ID: {{ _cluster_info.swarm_facts.ID[:12] }}
          Created:    {{ _cluster_info.swarm_facts.CreatedAt }}
          Nodes:      {{ _nodes | length }} ({{ _managers | length }} managers, {{ (_nodes | length) - (_managers | length) }} workers)
          {% for node in _nodes %}
            - {{ node.Hostname }}: {{ node.Availability }} ({{ node.Status }}){% if node.ManagerStatus %} [{{ node.ManagerStatus }}]{% endif %}

          {% endfor %}
    - name: Warn on non-Ready nodes
      ansible.builtin.debug:
        msg: |
          WARNING: one or more nodes are not Ready. Common causes:
          manager-worker network partition, Tailscale key/ACL issue, MTU mismatch.
      when: _cluster_info.nodes | rejectattr('Status', 'equalto', 'ready') | list | length > 0

# PLAY 4: Reset (destructive, requires --tags reset).
# Parallel: docker swarm leave --force is per-node and ordering-independent.
# ignore_unreachable lets reset complete when guests have been already destroyed
- name: Reset Swarm Cluster
  hosts: swarm
  gather_facts: false
  ignore_unreachable: true
  tags: ["reset", "never"]

  tasks:
    - name: Include swarm reset tasks
      ansible.builtin.include_role:
        name: applications/docker
        tasks_from: swarm_reset
