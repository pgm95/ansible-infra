---
all:
  hosts:
    localhost:
      ansible_connection: local
      ansible_python_interpreter: "{{ ansible_playbook_python }}"
  children:
    vps:
      hosts:
        swarm-vps:
          ansible_host: "{{ lookup('env', 'VPS_ADDR') }}"
    lxc:
      hosts:
        swarm-lxc:
          env_scope: prod
        swarm-lxc-dev:
          env_scope: dev
        fileserver:
          env_scope: prod
        fileserver-dev:
          env_scope: dev
    vm:
      hosts:
        swarm-vm:
          env_scope: prod
        swarm-vm-dev:
          env_scope: dev
    swarm: {} # Dynamic group populated by discover_swarm.yml
