---
# ============================================================================
# Docker Role - AMD Container Toolkit
# ============================================================================
# Installs the AMD container toolkit, generates a CDI spec, registers
# amd-container-runtime in daemon.json, and enables the CDI feature.
#
# Does NOT set docker_default_runtime - that policy is left to the user.
# To make amd the default runtime, set docker_default_runtime: amd in
# host_vars. Otherwise services opt in per-container via runtime: amd.
#
# Runtime registration in daemon.json happens via docker_runtimes and
# docker_cdi_enabled (set here via set_fact before the daemon config is
# rendered in main.yml).
#
# Creates a CDI spec candidate at /tmp/amd.json, then copies it to
# /etc/cdi/amd.json if it differs from the existing spec, for idempotency.

- name: Docker | AMD CTK | Register AMD runtime in daemon config
  ansible.builtin.set_fact:
    docker_runtimes: "{{ docker_runtimes | combine({'amd': {'path': 'amd-container-runtime', 'args': []}}) }}"
    docker_cdi_enabled: true

- name: Docker | AMD CTK | Stat amd-ctk binary
  ansible.builtin.stat:
    path: /usr/bin/amd-ctk
  register: __amd_ctk_installed

# Skip install + spec generation in check mode if amd-ctk isn't already on
# the host: deb822_repository can't add the repo for real in check mode, so
# the apt install would fail looking up the package. daemon.json diffs still
# render thanks to the set_fact above.
- name: Docker | AMD CTK | Toolkit install and CDI spec
  when: not ansible_check_mode or __amd_ctk_installed.stat.exists
  block:
    # AMD publishes apt repos keyed to Ubuntu codenames (jammy, noble). Map each
    # supported host distribution/major-version to the closest compatible suite.
    - name: Docker | AMD CTK | Determine AMD toolkit apt suite
      ansible.builtin.set_fact:
        __amd_toolkit_suite: >-
          {%- set dist = ansible_facts['distribution'] | lower -%}
          {%- set major = ansible_facts['distribution_major_version'] -%}
          {%- if dist == 'debian' and major == '12' -%}jammy
          {%- elif dist == 'debian' and major == '13' -%}noble
          {%- elif dist == 'ubuntu' and major == '22' -%}jammy
          {%- elif dist == 'ubuntu' and major == '24' -%}noble
          {%- endif -%}

    - name: Docker | AMD CTK | Validate AMD toolkit suite was resolved
      ansible.builtin.assert:
        that: __amd_toolkit_suite | length > 0
        fail_msg: >-
          AMD Container Toolkit has no apt suite for
          {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_major_version'] }}.
          Supported: Debian 12/13, Ubuntu 22.04/24.04.
        quiet: true

    - name: Docker | AMD CTK | Add AMD Container Toolkit apt repository
      ansible.builtin.deb822_repository:
        name: amd-container-toolkit
        types: [deb]
        uris: https://repo.radeon.com/amd-container-toolkit/apt/
        suites: "{{ __amd_toolkit_suite }}"
        components: [main]
        signed_by: https://repo.radeon.com/rocm/rocm.gpg.key
        state: present

    - name: Docker | AMD CTK | Install amd-container-toolkit
      ansible.builtin.apt:
        name: amd-container-toolkit
        state: present
        update_cache: true

    - name: Docker | AMD CTK | Ensure CDI spec directory exists
      ansible.builtin.file:
        path: /etc/cdi
        state: directory
        mode: "0755"

    - name: Docker | AMD CTK | Generate CDI spec candidate
      # amd-ctk enforces the output filename must be amd.json, so stage in /tmp.
      # check_mode: false because the copy task below needs the candidate file to
      # exist to compute its diff; the generate is read-only outside /tmp.
      ansible.builtin.command:
        cmd: amd-ctk cdi generate --output=/tmp/amd.json
      changed_when: false
      check_mode: false

    - name: Docker | AMD CTK | Install CDI spec
      ansible.builtin.copy:
        src: /tmp/amd.json
        dest: /etc/cdi/amd.json
        remote_src: true
        mode: "0644"
      notify: Docker | Restart docker

    - name: Docker | AMD CTK | Clean up CDI candidate
      ansible.builtin.file:
        path: /tmp/amd.json
        state: absent
      check_mode: false
