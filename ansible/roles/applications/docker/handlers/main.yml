---
# Docker role handlers

# Containerd is a separate systemd service. Order this before the docker
# restart handler so when both are notified in the same play, containerd
# reloads its config before docker reconnects.
- name: Docker | Restart containerd
  ansible.builtin.systemd:
    name: containerd
    state: restarted
    daemon_reload: true

- name: Docker | Restart docker
  ansible.builtin.systemd:
    name: docker
    state: restarted
    daemon_reload: true
  notify: Docker | Wait for docker ready

- name: Docker | Wait for docker ready
  ansible.builtin.wait_for:
    path: /var/run/docker.sock
    state: present
    timeout: 30

- name: Docker | Save iptables rules
  ansible.builtin.command: netfilter-persistent save
  listen: Docker | Save iptables rules
  changed_when: true
