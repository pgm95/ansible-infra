---
# ============================================================================
# Pre-Configuration Validation
# ============================================================================

- name: Validate SSH keys are defined
  ansible.builtin.assert:
    that:
      - ssh_authorized_keys is defined
      - ssh_authorized_keys | length > 0
    fail_msg: >-
      ssh_authorized_keys is missing or empty. Add at least one SSH
      public key to group_vars or host_vars to ensure access to managed hosts.
    success_msg: "SSH keys validated: {{ ssh_authorized_keys | length }} key(s)"
  tags: [ssh, validation]

- name: Validate ssh_permit_root_login value
  ansible.builtin.assert:
    that:
      - ssh_permit_root_login in ['yes', 'no', 'prohibit-password', 'forced-commands-only']
    fail_msg: >-
      Invalid ssh_permit_root_login value: '{{ ssh_permit_root_login }}'.
      Must be one of: yes, no, prohibit-password, forced-commands-only.
    success_msg: "PermitRootLogin validated: {{ ssh_permit_root_login }}"

- name: Validate ssh_max_auth_tries range
  ansible.builtin.assert:
    that:
      - ssh_max_auth_tries | int >= 1
      - ssh_max_auth_tries | int <= 10
    fail_msg: >-
      ssh_max_auth_tries must be between 1 and 10,
      got: {{ ssh_max_auth_tries }}. Too low locks out users, too high
      increases brute-force risk.
    success_msg: "MaxAuthTries validated: {{ ssh_max_auth_tries }}"

- name: Validate keepalive settings
  ansible.builtin.assert:
    that:
      - ssh_client_alive_interval | int >= 0
      - ssh_client_alive_count_max | int >= 0
    fail_msg: >-
      Keepalive values must be non-negative integers.
      Got ssh_client_alive_interval: {{ ssh_client_alive_interval }},
      ssh_client_alive_count_max: {{ ssh_client_alive_count_max }}.
    success_msg: "Keepalive settings validated"

- name: Warn if password authentication enabled
  ansible.builtin.debug:
    msg: |
      WARNING: Password authentication is enabled (ssh_password_authentication: true)
      This is less secure than key-based authentication.
      Consider: ssh_password_authentication: false
  when: ssh_password_authentication | bool

# ============================================================================
# Socket Activation Handling (Debian 13+)
# ============================================================================
# Debian 13 defaults to ssh.socket (systemd socket activation) which
# conflicts with direct service management via reload. Disable it in
# favor of ssh.service for consistent behavior across Debian versions.

- name: Check if ssh.socket unit exists
  ansible.builtin.stat:
    path: /usr/lib/systemd/system/ssh.socket
  register: __ssh_socket_unit

- name: Disable SSH socket activation
  when: __ssh_socket_unit.stat.exists
  block:
    - name: Ensure ssh.service is enabled for direct startup
      ansible.builtin.systemd:
        name: ssh
        enabled: true

    - name: Stop and disable ssh.socket
      ansible.builtin.systemd:
        name: ssh.socket
        state: stopped
        enabled: false

# ============================================================================
# Authorized Keys Deployment
# ============================================================================
# Root keys are deployed unconditionally for recovery access. User keys are
# deployed for users in users_list with ssh_keys: true. Runs before sshd
# hardening so the reload handler fires with keys already in place.

- name: Add SSH keys to root user
  ansible.posix.authorized_key:
    user: root
    key: "{{ ssh_authorized_keys | join('\n') }}"
    state: present
    exclusive: false # Don't remove existing keys
  no_log: true

- name: Add SSH keys for users
  ansible.posix.authorized_key:
    user: "{{ item.name }}"
    key: "{{ ssh_authorized_keys | join('\n') }}"
    state: present
    exclusive: true
  no_log: true
  loop: "{{ users_list | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - users_list | default([]) | length > 0
    - item.ssh_keys | default(false) | bool
    - item.name != 'root' # Root keys handled separately

# ============================================================================
# Client SSH Identity Deployment
# ============================================================================
# Deploys a private key for outbound SSH from this host (e.g. bastion -> swarm
# nodes). Skipped when ssh_client_identity is unset (empty dict default).

- name: Validate ssh_client_identity shape when set
  ansible.builtin.assert:
    that:
      - ssh_client_identity.name is defined
      - ssh_client_identity.name | length > 0
      - ssh_client_identity.private_key is defined
      - ssh_client_identity.private_key | length > 0
    fail_msg: >-
      ssh_client_identity is set but missing required fields. Provide both
      'name' and 'private_key' (got name={{ ssh_client_identity.name | default('undef') }},
      private_key length={{ (ssh_client_identity.private_key | default('')) | length }}).
    success_msg: "Client identity validated: {{ ssh_client_identity.name }}"
  when: ssh_client_identity | length > 0

- name: Deploy client SSH identity to /root/.ssh
  ansible.builtin.copy:
    dest: "/root/.ssh/{{ ssh_client_identity.name }}"
    # trim + explicit newline normalizes the value to exactly one trailing \n.
    # OpenSSH refuses to parse PEM keys missing the terminal newline (libcrypto
    # error), and SOPS/YAML env serialization frequently drops it.
    content: "{{ ssh_client_identity.private_key | trim }}\n"
    owner: root
    group: root
    mode: "0600"
  when: ssh_client_identity | length > 0
  no_log: true

# ============================================================================
# SSH Configuration Deployment
# ============================================================================

- name: Check if sshd_config.d directory exists
  ansible.builtin.stat:
    path: /etc/ssh/sshd_config.d
  register: __sshd_config_dir

- name: Ensure sshd_config.d directory exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: not __sshd_config_dir.stat.exists

- name: Deploy SSH hardening configuration
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/99-ansible.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
    content: |
      # Managed by Ansible
      PasswordAuthentication {{ ssh_password_authentication | ternary('yes', 'no') }}
      PermitRootLogin {{ ssh_permit_root_login }}
      PubkeyAuthentication {{ ssh_pubkey_authentication | ternary('yes', 'no') }}
      PermitEmptyPasswords {{ ssh_permit_empty_passwords | ternary('yes', 'no') }}
      ChallengeResponseAuthentication {{ ssh_challenge_response_authentication | ternary('yes', 'no') }}
      UsePAM {{ ssh_use_pam | ternary('yes', 'no') }}
      MaxAuthTries {{ ssh_max_auth_tries }}
      ClientAliveInterval {{ ssh_client_alive_interval }}
      ClientAliveCountMax {{ ssh_client_alive_count_max }}
    validate: "sshd -t -f /etc/ssh/sshd_config -f %s"
  notify: SSH | Reload sshd

- name: Display SSH configuration summary
  ansible.builtin.debug:
    msg:
      - "SSH hardening configuration deployed:"
      - "  - PermitRootLogin: {{ ssh_permit_root_login }}"
      - "  - PasswordAuthentication: {{ ssh_password_authentication }}"
      - "  - PubkeyAuthentication: {{ ssh_pubkey_authentication }}"
      - "  - MaxAuthTries: {{ ssh_max_auth_tries }}"
    verbosity: 1
