---
# ============================================================================
# SSH Role - User-Configurable Variables
# ============================================================================
# Variable naming convention:
#   __var      = Internal (computed/consumed within single task file)
#   _var       = Interface (passed between tasks/templates/handlers)
#   role_var   = Role output (computed, used across task files)
#
# SSH server hardening configuration for secure remote access.
# All variables are user-configurable via group_vars or host_vars.
#
# Purpose: Configure SSH security settings and connection management

# ============================================================================
# Authorized Keys
# ============================================================================
# ssh_authorized_keys must be provided via group_vars or host_vars as a list
# of public key strings. Keys are deployed to root (exclusive=false) and to
# users in users_list with ssh_keys: true (exclusive=true).

ssh_authorized_keys: [] # (list) SSH public keys for deployment

# ============================================================================
# Authentication Configuration
# ============================================================================

ssh_password_authentication: false # (boolean) Enable/disable password authentication
ssh_pubkey_authentication: true # (boolean) Enable/disable public key authentication
ssh_permit_empty_passwords: false # (boolean) Allow empty passwords (security risk)
ssh_challenge_response_authentication: false # (boolean) Enable/disable challenge-response auth

# ============================================================================
# Access Control
# ============================================================================

ssh_permit_root_login: prohibit-password # (string) Root login method: yes|no|prohibit-password|forced-commands-only
ssh_use_pam: true # (boolean) Enable/disable PAM authentication
ssh_max_auth_tries: 3 # (integer) Maximum authentication attempts per connection

# ============================================================================
# Connection Management
# ============================================================================

ssh_client_alive_interval: 300 # (integer) Seconds between keepalive messages (0=disabled)
ssh_client_alive_count_max: 2 # (integer) Missed keepalives before disconnect
