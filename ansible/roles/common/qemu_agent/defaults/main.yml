---
# ============================================================================
# QEMU Agent Role - User-Configurable Variables
# ============================================================================
# Variable naming convention:
#   __var      = Internal (computed/consumed within single task file)
#   _var       = Interface (passed between tasks/templates/handlers)
#   role_var   = Role output (computed, used across task files)
#
# Auto-detect and install QEMU Guest Agent on QEMU/KVM virtual machines.
# All variables are user-configurable via group_vars or host_vars.
#
# Purpose: Enable VM management features (shutdown, snapshots, IP reporting)
# Detection: Only installs on QEMU/KVM VMs with virtio guest agent port

# ============================================================================
# Feature Control
# ============================================================================

qemu_agent_enabled: false # (boolean) Enable/disable QEMU guest agent installation
                                                    # Safe to enable globally - auto-detects VM environment
                                                    # Skips installation on:
                                                    #   - Bare metal servers
                                                    #   - Non-QEMU/KVM VMs
                                                    #   - VMs without virtio-serial port

# ============================================================================
# Detection Logic (Automatic)
# ============================================================================
# Role performs multi-stage detection:
# 1. Check ansible_virtualization_type for QEMU/KVM
# 2. Verify /dev/virtio-ports/org.qemu.guest_agent.0 exists
# 3. Only install if both conditions are true

# ============================================================================
# Benefits of QEMU Guest Agent
# ============================================================================
# - Graceful VM shutdown from Proxmox
# - Accurate VM IP address reporting
# - File system freeze for consistent snapshots
# - Time synchronization after VM migration
# - Custom commands execution from hypervisor

# ============================================================================
# Internal Variables (Computed at Runtime)
# ============================================================================
# __is_qemu_vm: false                              # Boolean: Detected QEMU/KVM virtualization
# __qemu_ga_port: {}                               # Stat result for virtio guest agent port
