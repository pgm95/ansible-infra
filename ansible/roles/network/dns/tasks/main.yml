---
# DNS resolver configuration with intelligent backend detection

### Validation
- name: Validate DNS configuration
  when: net_dns_configure | bool
  ansible.builtin.assert:
    that:
      - net_dns_servers is defined
      - net_dns_servers | length > 0
    fail_msg: "net_dns_servers must contain at least one DNS server when net_dns_configure is true"
    quiet: true

### DNS Configuration with intelligent detection

- name: Read /etc/resolv.conf content
  when: net_dns_configure | bool
  ansible.builtin.slurp:
    path: /etc/resolv.conf
  register: __resolv_conf_content
  failed_when: false

- name: Check if Tailscale manages DNS
  when: net_dns_configure | bool
  ansible.builtin.set_fact:
    __tailscale_dns_found: "{{ 'tailscale' in (__resolv_conf_content.content | b64decode) if __resolv_conf_content.content is defined else false }}"

- name: Check if systemd-resolved is active
  when: net_dns_configure | bool
  ansible.builtin.systemd:
    name: systemd-resolved
  register: __systemd_resolved_status
  failed_when: false
  check_mode: false

- name: Check if resolvconf exists
  when: net_dns_configure | bool
  ansible.builtin.stat:
    path: /usr/bin/resolvconf
  register: __resolvconf_check

- name: Determine DNS management system
  when: net_dns_configure | bool
  ansible.builtin.set_fact:
    __dns_manager: >-
      {{
        'tailscale' if __tailscale_dns_found | default(false) else
        'systemd-resolved' if (__systemd_resolved_status.status.ActiveState | default('inactive')) == 'active' else
        'resolvconf' if __resolvconf_check.stat.exists | default(false) else
        'direct'
      }}

- name: Display detected DNS manager
  when: net_dns_configure | bool
  ansible.builtin.debug:
    msg: "Detected DNS manager: {{ __dns_manager }}"
    verbosity: 1

# Skip DNS configuration if Tailscale manages it
- name: Skip DNS configuration (Tailscale managed)
  when:
    - net_dns_configure | bool
    - __dns_manager == 'tailscale'
  ansible.builtin.debug:
    msg: "Skipping DNS configuration - Tailscale manages DNS"
    verbosity: 1

# systemd-resolved method
- name: Configure DNS (systemd-resolved)
  when:
    - net_dns_configure | bool
    - __dns_manager == 'systemd-resolved'
  block:
    - name: Ensure systemd-resolved drop-in directory exists
      ansible.builtin.file:
        path: /etc/systemd/resolved.conf.d
        state: directory
        mode: "0755"

    - name: Configure systemd-resolved via drop-in file
      ansible.builtin.template:
        src: dns_systemd_resolved.j2
        dest: /etc/systemd/resolved.conf.d/99-ansible.conf
        mode: "0644"
      notify: DNS | Restart systemd-resolved

    - name: Ensure /etc/resolv.conf is symlink to systemd-resolved (stub)
      ansible.builtin.file:
        src: /run/systemd/resolve/stub-resolv.conf
        dest: /etc/resolv.conf
        state: link
        force: true
      when: net_dns_stub_resolver | bool

    - name: Ensure /etc/resolv.conf is symlink to systemd-resolved (direct)
      ansible.builtin.file:
        src: /run/systemd/resolve/resolv.conf
        dest: /etc/resolv.conf
        state: link
        force: true
      when: not (net_dns_stub_resolver | bool)

# resolvconf method
- name: Configure DNS (resolvconf)
  when:
    - net_dns_configure | bool
    - __dns_manager == 'resolvconf'
  block:
    - name: Create resolvconf head file for custom DNS
      ansible.builtin.template:
        src: dns_resolvconf_head.j2
        dest: /etc/resolvconf/resolv.conf.d/head
        mode: "0644"
      notify: DNS | Update resolvconf

    - name: Ensure /etc/resolv.conf symlink exists
      ansible.builtin.file:
        src: /run/resolvconf/resolv.conf
        dest: /etc/resolv.conf
        state: link
        force: true
      notify: DNS | Update resolvconf

# Direct file method (fallback)
- name: Configure DNS (direct file)
  when:
    - net_dns_configure | bool
    - __dns_manager == 'direct'
  ansible.builtin.template:
    src: dns_resolv.conf.j2
    dest: /etc/resolv.conf
    mode: "0644"
    backup: true
