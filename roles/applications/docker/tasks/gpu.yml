---
# ============================================================================
# Docker Role - GPU Configuration
# ============================================================================
# Configures GPU support for Docker containers:
#   - Appends "gpu=1" to node-generic-resources for Swarm scheduling
#   - Deploys udev rules for DRM device permissions

- name: Docker | Register GPU as generic resource
  ansible.builtin.set_fact:
    docker_node_generic_resources: "{{ docker_node_generic_resources + ['gpu=1'] }}"
  when: "'gpu=1' not in docker_node_generic_resources"

- name: Docker | Deploy GPU udev rules
  ansible.builtin.copy:
    dest: /etc/udev/rules.d/99-dri.rules
    content: |
      KERNEL=="card[0-9]*", SUBSYSTEM=="drm", MODE="0666"
      KERNEL=="renderD*", SUBSYSTEM=="drm", MODE="0666"
    mode: "0644"
    backup: true
  notify: Docker | Reload udev rules
