---
# ============================================================================
# Hostname Role - User-Configurable Variables
# ============================================================================
# Variable naming convention:
#   __var      = Internal (computed/consumed within single task file)
#   _var       = Interface (passed between tasks/templates/handlers)
#   role_var   = Role output (computed, used across task files)
#
# Feature Control
hostname_configure: false # (boolean) Enable/disable hostname configuration
hostname_default: "{{ inventory_hostname }}" # (string) Fallback hostname if 'hostname' undefined
hostname_domain_suffix: "" # (string) Domain suffix for FQDN construction

# Internal Variables (Computed at Runtime)
# hostname: ""                                      # Resolved hostname (from host_vars or hostname_default)
# fqdn: ""                                          # Fully Qualified Domain Name: {hostname}.{hostname_domain_suffix}
# _primary_ip: ""                                   # Primary IP address (used in template)
