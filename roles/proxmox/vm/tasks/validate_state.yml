---
# ============================================================================
# VM Role - State Validation with Reconciliation
# ============================================================================
# Uses shared task for reconciliation logic (DRY principle)

- name: VM | Check VM state using shared reconciliation task
  ansible.builtin.include_tasks: "{{ _proxmox_shared_tasks }}/check_resource_state.yml"
  vars:
    _resource_type: vm
    _hostname: "{{ vm_hostname }}"
    _vmid: "{{ vm_vmid }}"

# Map shared output to VM-specific variable names for backward compatibility
- name: VM | Set VM-specific state variables
  ansible.builtin.set_fact:
    vm_state: "{{ resource_state }}"
    vm_exists: "{{ resource_state.exists }}"

# Early exit if nothing to do
- name: VM | Skip if VM already exists (reconciled)
  ansible.builtin.meta: end_host
  when: vm_state.action == 'skip'
