---
# Handles automatic download and caching of cloud images

- name: VM | Extract filename from URL
  ansible.builtin.set_fact:
    vm_cloud_image_filename: "{{ vm_cloud_image_url | basename }}"

- name: VM | Set local image path
  ansible.builtin.set_fact:
    vm_cloud_image_local_path: "{{ vm_cloud_image_cache_dir }}/{{ vm_cloud_image_filename }}"

- name: VM | Check if cloud image already exists
  ansible.builtin.stat:
    path: "{{ vm_cloud_image_local_path }}"
  register: cloud_image_stat

- name: VM | Download cloud image
  ansible.builtin.get_url:
    url: "{{ vm_cloud_image_url }}"
    dest: "{{ vm_cloud_image_local_path }}"
    mode: "0644"
    timeout: 600
  when: not cloud_image_stat.stat.exists
  register: download_result

# Verify newly downloaded image (uses separate variable to avoid overwrite on skip)
- name: Verify downloaded image
  when: download_result is changed # noqa: no-handler
  block:
    - name: VM | Get downloaded image stats
      ansible.builtin.stat:
        path: "{{ vm_cloud_image_local_path }}"
      register: downloaded_image_stat

    - name: Validate image size
      ansible.builtin.assert:
        that: downloaded_image_stat.stat.size >= 100000000
        fail_msg: "Downloaded image too small ({{ downloaded_image_stat.stat.size }} bytes), likely corrupted"

    - name: VM | Update cloud_image_stat with verified stats
      ansible.builtin.set_fact:
        cloud_image_stat: "{{ downloaded_image_stat }}"

- name: VM | Display cloud image status
  ansible.builtin.debug:
    msg:
      - "{{ 'Downloaded' if download_result is changed else 'Using cached' }}: {{ vm_cloud_image_filename }}"
      - "  Path: {{ vm_cloud_image_local_path }}"
      - "  Size: {{ (cloud_image_stat.stat.size / 1024 / 1024) | round(2) }} MB"
    verbosity: 1
