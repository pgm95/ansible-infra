---
# ============================================================================
# VM Role - VM Creation Workflow
# ============================================================================
# Creates VMs using native qm create with automatic device detection

# Validation already performed in main.yml via validate_state.yml
# We only reach this point if VM needs to be created

# ============================================================================
# Helper Variables for Disk Configuration
# ============================================================================
# Boot disk is always vm_disks[0], additional disks are vm_disks[1:]
- name: VM | Set disk configuration helpers
  ansible.builtin.set_fact:
    __boot_disk: "{{ vm_disks[0] }}"
    __additional_disks: "{{ vm_disks[1:] | default([]) }}"

- name: VM | Create temporary directory for VM operations
  ansible.builtin.file:
    path: "{{ vm_temp_dir }}"
    state: directory
    mode: "0700"

- name: VM | Stage SSH public keys for cloud-init
  ansible.builtin.copy:
    content: "{{ vault_ssh_authorized_keys | join('\n') }}\n"
    dest: "{{ vm_temp_dir }}/ssh-keys.pub"
    mode: "0600"
  when:
    - vm_cloudinit_enabled
    - vault_ssh_authorized_keys | default([]) | length > 0

- name: VM | Execute qm create command
  ansible.builtin.command: "{{ qm_create_cmd }}"
  register: qm_create_result
  changed_when: qm_create_result.rc == 0
  failed_when: qm_create_result.rc != 0

- name: VM | Display creation result
  ansible.builtin.debug:
    msg:
      - "VM created successfully"
      - "VMID: {{ vm_final_vmid }}"
      - "Hostname: {{ vm_final_hostname }}"
    verbosity: 1

# ============================================================================
# Boot Disk Creation (scsi0)
# ============================================================================
# The proxmox_disk module REQUIRES password authentication (root@pam + password)
# for disk import and resize operations. Token authentication is NOT supported.
- name: VM | Import and attach boot disk from cloud image
  community.proxmox.proxmox_disk:
    api_host: "{{ proxmox_api_host }}"
    api_user: "root@pam"
    api_password: "{{ proxmox_api_password }}"
    api_token_id: "{{ omit }}"
    api_token_secret: "{{ omit }}"
    validate_certs: "{{ proxmox_api_validate_certs }}"
    vmid: "{{ vm_final_vmid }}"
    disk: scsi0
    storage: "{{ vm_final_storage }}"
    import_from: "{{ vm_cloud_image_local_path }}"
    backup: "{{ __boot_disk.backup | default(true) }}"
    ssd: "{{ __boot_disk.ssd | default(true) }}"
    discard: "{{ __boot_disk.discard | default('on') }}"
    iothread: "{{ __boot_disk.iothread | default(true) }}"
    cache: "{{ __boot_disk.cache | default('none') }}"
    state: present
  delegate_to: localhost
  register: disk_import_result

- name: VM | Resize boot disk to specified size
  community.proxmox.proxmox_disk:
    api_host: "{{ proxmox_api_host }}"
    api_user: "root@pam"
    api_password: "{{ proxmox_api_password }}"
    api_token_id: "{{ omit }}"
    api_token_secret: "{{ omit }}"
    validate_certs: "{{ proxmox_api_validate_certs }}"
    vmid: "{{ vm_final_vmid }}"
    disk: scsi0
    size: "{{ __boot_disk.size }}G"
    state: resized
  delegate_to: localhost
  register: disk_resize_result

- name: VM | Display boot disk configuration
  ansible.builtin.debug:
    msg:
      - "Boot disk configured:"
      - "  Storage: {{ vm_final_storage }}"
      - "  Size: {{ __boot_disk.size }} GiB"
      - "  Cache: {{ __boot_disk.cache | default('none') }}"
    verbosity: 1

# ============================================================================
# Additional Disk Creation
# ============================================================================
# Creates additional storage disks from vm_disks[1:].
# Properties inherit from boot disk (vm_disks[0]) unless overridden.
# Index calculation: SCSI starts at 1 (scsi0=boot), others start at 0.

- name: VM | Create additional storage disks
  community.proxmox.proxmox_disk:
    api_host: "{{ proxmox_api_host }}"
    api_user: "root@pam"
    api_password: "{{ proxmox_api_password }}"
    api_token_id: "{{ omit }}"
    api_token_secret: "{{ omit }}"
    validate_certs: "{{ proxmox_api_validate_certs }}"
    vmid: "{{ vm_final_vmid }}"
    disk: >-
      {{ item.bus | default('scsi') }}{{
        (__additional_disks[:idx+1] | selectattr('bus', 'undefined') | list | length)
        + (__additional_disks[:idx+1]
           | selectattr('bus', 'defined')
           | selectattr('bus', 'equalto', item.bus | default('scsi'))
           | list | length)
        - 1
        + (1 if (item.bus | default('scsi')) == 'scsi' else 0)
      }}
    storage: "{{ item.storage | default(__boot_disk.storage) | default(vm_final_storage) }}"
    size: "{{ item.size }}"
    create: regular
    backup: "{{ item.backup if item.backup is defined else __boot_disk.backup | default(true) }}"
    ssd: "{{ item.ssd if item.ssd is defined else __boot_disk.ssd | default(true) }}"
    discard: "{{ item.discard if item.discard is defined else __boot_disk.discard | default('on') }}"
    iothread: "{{ item.iothread if item.iothread is defined else __boot_disk.iothread | default(true) }}"
    cache: "{{ item.cache if item.cache is defined else __boot_disk.cache | default('none') }}"
    state: present
  delegate_to: localhost
  loop: "{{ __additional_disks }}"
  loop_control:
    index_var: idx
    label: "{{ item.bus | default('scsi') }} - {{ item.size }}G"
  when: __additional_disks | length > 0
  register: additional_disks_result

- name: VM | Display additional disks summary
  ansible.builtin.debug:
    msg: >-
      Additional disks created: {{ __additional_disks | length }} -
      {% for disk in __additional_disks -%}
      {{ disk.bus | default('scsi') }}: {{ disk.size }}G{%- if not loop.last %}, {% endif -%}
      {%- endfor %}
  when:
    - __additional_disks | length > 0
    - ansible_verbosity > 0

- name: VM | Start VM after creation
  community.proxmox.proxmox_kvm:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_token_id: "{{ proxmox_api_token_id }}"
    api_token_secret: "{{ proxmox_api_token_secret }}"
    validate_certs: "{{ proxmox_api_validate_certs }}"
    node: "{{ hostvars[pve_host].proxmox_node_name | default(pve_host) }}"
    vmid: "{{ vm_final_vmid }}"
    state: started
  delegate_to: localhost
  register: start_result
  when: vm_start_after_create

- name: VM | Wait for VM to boot and become ready
  when:
    - vm_start_after_create
    - vm_wait_for_boot
  block:
    - name: VM | Wait for QEMU guest agent to respond (fast boot detection)
      ansible.builtin.command: qm agent {{ vm_final_vmid }} ping
      register: agent_boot_check
      retries: 10
      delay: 2
      until: agent_boot_check.rc == 0
      changed_when: false
      failed_when: false

    - name: VM | Display boot detection result
      ansible.builtin.debug:
        msg: >-
          {{ 'VM booted (agent detected in ' +
          ((agent_boot_check.attempts | int) * 2 | string) + 's)'
          if agent_boot_check.rc == 0
          else 'Agent unavailable, using fallback wait' }}
        verbosity: 1

    - name: VM | Fallback to short wait if agent unavailable
      ansible.builtin.pause:
        seconds: 10
      when: agent_boot_check.rc != 0

- name: Verify VM configuration matches requested settings
  block:
    - name: VM | Get created VM configuration (API)
      community.proxmox.proxmox_vm_info:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ proxmox_api_token_secret }}"
        validate_certs: "{{ proxmox_api_validate_certs }}"
        vmid: "{{ vm_final_vmid }}"
      delegate_to: localhost
      register: created_vm_info

    - name: VM | Debug API response structure
      ansible.builtin.debug:
        msg:
          - "API response keys: {{ created_vm_info.keys() | list }}"
          - "proxmox_vms: {{ created_vm_info.proxmox_vms | default('N/A') }}"
      when: ansible_verbosity > 0

    - name: VM | Extract VM configuration
      ansible.builtin.set_fact:
        created_vm_config: >-
          {{
            created_vm_info.proxmox_vms[0]
            if created_vm_info.proxmox_vms is defined
            else (created_vm_info.vms[0] if created_vm_info.vms is defined else created_vm_info)
          }}

    - name: VM | Display VM configuration from API
      ansible.builtin.debug:
        msg:
          - "VM Configuration (API):"
          - "  CPUs: {{ created_vm_config.cpus | default(created_vm_config.maxcpu) | default('N/A') }}"
          - "  Memory: {{ (created_vm_config.maxmem | default(0) | int / 1048576) | int }} MB"
          - "  Disk Size: {{ (created_vm_config.maxdisk | default(0) | int / 1073741824) | int }} GB"
          - "  Status: {{ created_vm_config.status | default('unknown') }}"
      when: ansible_verbosity > 0

    - name: Verify critical settings
      ansible.builtin.assert:
        that:
          # API returns runtime info: cpus/maxcpu for cores, maxmem in bytes, maxdisk for disk
          - (created_vm_config.cpus | default(created_vm_config.maxcpu) | int) == (vm_cores | int * vm_sockets | int)
          - created_vm_config.maxmem | int == (vm_memory | int * 1048576)
          - created_vm_config.maxdisk | int >= (__boot_disk.size | int * 1073741824)
          - created_vm_config.status == 'running'
        fail_msg: "VM configuration verification failed - settings do not match requested values"
        success_msg: "VM configuration verified successfully"

- name: VM | Discover VM IP address via DNS
  when: vm_ip_discovery_method == 'dns'
  block:
    - name: VM | Attempt DNS resolution
      ansible.builtin.command: getent hosts {{ vm_final_hostname }}
      register: dns_lookup
      changed_when: false
      failed_when: false
      retries: "{{ vm_ip_discovery_retries }}"
      delay: "{{ vm_ip_discovery_delay }}"
      until: dns_lookup.rc == 0

    - name: VM | Extract IP from DNS result
      ansible.builtin.set_fact:
        discovered_ip: "{{ dns_lookup.stdout.split()[0] }}"
      when: dns_lookup.rc == 0

    - name: VM | Use hostname for connection (DNS resolution)
      ansible.builtin.set_fact:
        discovered_ip: "{{ vm_final_hostname }}"
      when: dns_lookup.rc != 0

- name: VM | Discover VM IP via QEMU agent
  when:
    - vm_ip_discovery_method == 'agent'
    - vm_agent_enabled
  block:
    - name: VM | Get IP from QEMU agent
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail &&
          qm guest exec {{ vm_final_vmid }} -- ip -4 addr show |
          grep inet | grep -v '127.0.0.1' |
          awk '{print $2}' | cut -d'/' -f1 | head -1
        executable: /bin/bash
      register: agent_ip
      changed_when: false
      failed_when: false
      retries: "{{ vm_ip_discovery_retries }}"
      delay: "{{ vm_ip_discovery_delay }}"
      until: agent_ip.rc == 0 and agent_ip.stdout | length > 0

    - name: VM | Set discovered IP
      ansible.builtin.set_fact:
        discovered_ip: "{{ agent_ip.stdout | trim }}"
      when: agent_ip.rc == 0

- name: VM | Display VM connection information
  ansible.builtin.debug:
    msg:
      - "VM network information:"
      - "  Hostname: {{ vm_final_hostname }}"
      - "  Connection: {{ discovered_ip | default('DNS-based') }}"
      - "  Cloud-init: {{ 'completing in background' if vm_cloudinit_enabled else 'disabled' }}"
      - ""
      - "Next steps:"
      - "  - VM will be automatically provisioned via SSH"
      - "  - Connection uses DNS-resolved hostname: {{ vm_final_hostname }}"
    verbosity: 1

- name: VM | Clean up temporary directory
  ansible.builtin.file:
    path: "{{ vm_temp_dir }}"
    state: absent
