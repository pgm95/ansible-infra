---
# ============================================================================
# VM Role - Pre-Creation Validation
# ============================================================================
# Validates configuration and environment before VM creation

# ============================================================================
# Common Validation (Shared Task)
# ============================================================================
- name: VM | Validate Proxmox environment and pve_host
  ansible.builtin.include_tasks: "{{ _proxmox_shared_tasks }}/validate_common.yml"
  vars:
    _resource_type: "VM"

# ============================================================================
# Identity Validation (Required for ansible_id computation)
# ============================================================================
# Both vm_hostname and vm_vmid MUST be explicitly defined.
# These are used to compute the unique ansible_id hash for reconciliation.

- name: VM | Enforce vm_hostname is explicitly defined
  ansible.builtin.assert:
    that:
      - vm_hostname is defined
      - vm_hostname | string | length > 0
    fail_msg: >-
      vm_hostname must be explicitly defined in host_vars for ansible_id
      computation (e.g. vm_hostname: "myvm").
    success_msg: "vm_hostname validated: {{ vm_hostname }}"

- name: VM | Enforce vm_vmid is explicitly defined
  ansible.builtin.assert:
    that:
      - vm_vmid is defined
      - vm_vmid | string | length > 0
    fail_msg: >-
      vm_vmid must be explicitly defined in host_vars -- auto-assignment is
      not allowed. Required for ansible_id computation
      (e.g. vm_vmid: "200").
    success_msg: "vm_vmid validated: {{ vm_vmid }}"

# ============================================================================
# Compute ansible_id (Shared Task)
# ============================================================================
- name: VM | Compute ansible_id using shared task
  ansible.builtin.include_tasks: "{{ _proxmox_shared_tasks }}/compute_ansible_id.yml"
  vars:
    _hostname: "{{ vm_hostname }}"
    _vmid: "{{ vm_vmid }}"

# ============================================================================
# Resource Validation
# ============================================================================

- name: VM | Validate required variables
  ansible.builtin.assert:
    that:
      - vm_cores is defined
      - vm_cores | int > 0
      - vm_memory is defined
      - vm_memory | int >= 512
      - vm_disks is defined
      - vm_disks | length > 0
      - vm_disks[0].size is defined
      - vm_disks[0].size | int > 0
      - vm_net_bridge is defined
      - vm_net_bridge | length > 0
    fail_msg: >-
      Required VM variables are missing or invalid.
      vm_cores: {{ vm_cores | default('undefined') }} (must be > 0),
      vm_memory: {{ vm_memory | default('undefined') }} (must be >= 512 MiB),
      vm_disks: must have at least one disk with size > 0,
      vm_net_bridge: {{ vm_net_bridge | default('undefined') }} (must not be empty).
    success_msg: "Required variables validated"

- name: VM | Validate boolean types
  ansible.builtin.assert:
    that:
      - item.value is boolean
    fail_msg: "Variable '{{ item.key }}' must be a boolean (true/false), got: {{ item.value }}"
    success_msg: "Variable '{{ item.key }}' is a valid boolean"
  loop: "{{ boolean_vars | dict2items }}"
  vars:
    boolean_vars:
      vm_template: "{{ vm_template }}"
      vm_protection: "{{ vm_protection }}"
      vm_start_on_boot: "{{ vm_start_on_boot }}"
      vm_cloudinit_enabled: "{{ vm_cloudinit_enabled }}"
      vm_cloudinit_upgrade: "{{ vm_cloudinit_upgrade }}"
      vm_kvm_enabled: "{{ vm_kvm_enabled }}"
      vm_acpi_enabled: "{{ vm_acpi_enabled }}"
      vm_agent_enabled: "{{ vm_agent_enabled }}"

- name: VM | Validate numeric variables
  ansible.builtin.assert:
    that:
      - item.value | int >= item.min
      - item.value | int <= item.max
    fail_msg: "Variable '{{ item.key }}' out of range ({{ item.min }}-{{ item.max }}), got: {{ item.value }}"
    success_msg: "Variable '{{ item.key }}' is valid: {{ item.value }}"
  loop:
    - { key: "vm_cores", value: "{{ vm_cores }}", min: 1, max: 128 }
    - { key: "vm_sockets", value: "{{ vm_sockets }}", min: 1, max: 4 }
    - { key: "vm_memory", value: "{{ vm_memory }}", min: 512, max: 524288 }
    - { key: "vm_balloon", value: "{{ vm_balloon }}", min: 0, max: "{{ vm_memory | int }}" }

- name: VM | Validate cloud-init configuration
  ansible.builtin.assert:
    that:
      - vm_cloudinit_ip is defined
      - vm_cloudinit_ip | length > 0
      - vm_cloudinit_type in ['nocloud', 'configdrive2']
      - vm_cloudinit_user is defined
      - vm_cloudinit_user | length > 0
    fail_msg: >-
      Cloud-init configuration is invalid.
      vm_cloudinit_ip: {{ vm_cloudinit_ip | default('undefined') }} (must be 'dhcp' or CIDR),
      vm_cloudinit_type: {{ vm_cloudinit_type | default('undefined') }} (must be 'nocloud' or 'configdrive2'),
      vm_cloudinit_user: {{ vm_cloudinit_user | default('undefined') }} (must not be empty).
    success_msg: "Cloud-init configuration validated"
  when: vm_cloudinit_enabled

- name: VM | Validate BIOS and machine configuration
  ansible.builtin.assert:
    that:
      - vm_bios_type in ['seabios', 'ovmf']
      - vm_machine_type in ['q35', 'i440fx']
      - vm_boot_order is defined
      - vm_boot_order | length > 0
    fail_msg: >-
      BIOS/machine configuration is invalid.
      vm_bios_type: {{ vm_bios_type | default('undefined') }} (must be 'seabios' or 'ovmf'),
      vm_machine_type: {{ vm_machine_type | default('undefined') }} (must be 'q35' or 'i440fx'),
      vm_boot_order: {{ vm_boot_order | default('undefined') }} (must not be empty).
    success_msg: "BIOS/machine configuration validated"

- name: VM | Validate network configuration
  ansible.builtin.assert:
    that:
      - vm_net_model in ['virtio', 'e1000', 'e1000e', 'rtl8139']
    fail_msg: >-
      Invalid vm_net_model: '{{ vm_net_model | default('undefined') }}'.
      Must be one of: virtio, e1000, e1000e, rtl8139.
    success_msg: "Network configuration validated"

- name: VM | Validate cloud image settings
  ansible.builtin.assert:
    that:
      - vm_cloud_image_url is defined
      - vm_cloud_image_url | length > 0
      - vm_cloud_image_cache_dir is defined
      - vm_cloud_image_cache_dir | length > 0
    fail_msg: >-
      Cloud image settings are invalid.
      vm_cloud_image_url: {{ vm_cloud_image_url | default('undefined') }} (must be a valid URL),
      vm_cloud_image_cache_dir: {{ vm_cloud_image_cache_dir | default('undefined') }} (must not be empty).
    success_msg: "Cloud image settings validated"
  when: vm_cloud_image_enabled

# ============================================================================
# Disk Configuration Validation
# ============================================================================
# Validates all disks in vm_disks array. First disk is boot disk (scsi0).

- name: VM | Validate disk configuration
  ansible.builtin.assert:
    that:
      - item.size is defined
      - item.size | int > 0
      - item.size | int <= 999999
      - (item.bus | default('scsi')) in ['scsi', 'sata', 'virtio', 'ide']
      - (item.cache | default('none')) in ['', 'none', 'writethrough', 'writeback', 'directsync', 'unsafe']
      - (item.discard | default('on')) in ['', 'on', 'ignore']
    fail_msg: >-
      Disk {{ idx }} ({{ 'boot' if idx == 0 else 'additional' }}) configuration invalid:
      size={{ item.size | default('MISSING') }},
      bus={{ item.bus | default('scsi') }},
      cache={{ item.cache | default('none') }},
      discard={{ item.discard | default('on') }}
    success_msg: >-
      Disk {{ idx }} validated: {{ 'boot (scsi0)' if idx == 0 else (item.bus | default('scsi')) }} {{ item.size }}G
  loop: "{{ vm_disks }}"
  loop_control:
    index_var: idx
    label: "disk {{ idx }}"

- name: VM | Warn if SSH keys not defined
  ansible.builtin.debug:
    msg: "WARNING: ssh_authorized_keys is not defined or empty — VM will have no SSH access"
  when:
    - vm_cloudinit_enabled
    - ssh_authorized_keys | default([]) | length == 0

- name: VM | Display validation summary
  ansible.builtin.debug:
    msg:
      - "VM configuration validated successfully"
      - "VM Identity:"
      - "  - Hostname: {{ vm_hostname }}"
      - "  - VMID: {{ vm_vmid }}"
      - "  - ansible_id: {{ ansible_id }} (tag: {{ ansible_id_tag }})"
      - "VM Resources:"
      - "  - Cores: {{ vm_cores }}, Sockets: {{ vm_sockets }}"
      - "  - Memory: {{ vm_memory }} MiB"
      - "  - Boot Disk: {{ vm_disks[0].size }} GiB"
      - "  - Additional Disks: {{ (vm_disks | length) - 1 }}"
      - "  - Network: {{ vm_net_model }} on {{ vm_net_bridge }}"
      - "  - Cloud-init: {{ 'enabled' if vm_cloudinit_enabled else 'disabled' }}"
    verbosity: 1
