---
# ============================================================================
# VM Role - Main Task Orchestration
# ============================================================================
# Orchestrates VM creation workflow with validation and error handling
#
# Flow:
# 1. validate.yml - Validates config and computes ansible_id (hash of hostname+vmid)
# 2. validate_state.yml - Checks if VM exists by ansible_id tag (reconciliation)
# 3. create.yml - Creates VM if needed
#
# Shared Tasks: Uses common tasks from proxmox/shared/tasks/ for reconciliation
# and cleanup operations (compute_ansible_id, check_resource_state, cleanup_failed_resource)

- name: VM | Set shared tasks path
  ansible.builtin.set_fact:
    _proxmox_shared_tasks: "{{ role_path }}/../shared/tasks"

- name: VM | Creation workflow
  block:
    # Validation MUST run first to compute ansible_id for reconciliation
    - name: VM | Validate configuration and compute ansible_id
      ansible.builtin.include_tasks: validate.yml
      tags: [always]

    # State check uses ansible_id for reconciliation matching
    - name: VM | Check VM state (reconciliation)
      ansible.builtin.include_tasks: validate_state.yml
      tags: [always]

    - name: VM | Download cloud image
      ansible.builtin.include_tasks: image_download.yml
      when: vm_cloud_image_enabled
      tags: [create]

    - name: VM | Setup cloud-init custom vendor data
      ansible.builtin.include_tasks: cicustom.yml
      when: vm_cicustom_vendor_enabled
      tags: [create]

    - name: VM | Build qm create command
      ansible.builtin.include_tasks: build_qm_command.yml
      tags: [create]

    - name: VM | Create VM
      ansible.builtin.include_tasks: create.yml
      tags: [create]

  rescue:
    - name: VM | Display error information
      ansible.builtin.debug:
        msg:
          - "VM creation failed"
          - "VMID: {{ vm_final_vmid | default('N/A') }}"
          - "Hostname: {{ vm_final_hostname | default(inventory_hostname) }}"
          - "Error: {{ ansible_failed_result.msg | default('Unknown error') }}"

    - name: VM | Clean up temporary directory on failure
      ansible.builtin.file:
        path: "{{ vm_temp_dir }}"
        state: absent
      when: vm_temp_dir is defined

    - name: VM | Cleanup failed VM using shared task
      ansible.builtin.include_tasks: "{{ _proxmox_shared_tasks }}/cleanup_failed_resource.yml"
      vars:
        _resource_type: vm
        _vmid: "{{ vm_final_vmid }}"
        _resource_exists: "{{ vm_exists | default(false) }}"

    - name: VM | Fail with error message
      ansible.builtin.fail:
        msg: "VM creation failed. Check error messages above."
