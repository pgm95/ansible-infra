---
# VM Role Defaults
# Note: Proxmox API vars inherited from inventory/group_vars/proxmox.yml

# Internal Computed Variables
# IMPORTANT: These are NOT meant to be overridden by users.
# All user-configurable defaults are in inventory/group_vars/vm.yml

# VM Identity (Computed at runtime)
# vm_final_vmid: ""                  # Resolved VM ID (vm_vmid or auto-assigned)
# vm_final_hostname: ""              # Resolved hostname (vm_hostname or inventory_hostname)

# Storage Management (Computed at runtime)
# vm_final_storage: ""               # Resolved storage pool (vm_disks[0].storage > vm_default_storage > auto-select)
# vm_cloud_image_local_path: ""      # Path to downloaded/cached cloud image on Proxmox

# Disk Configuration (Computed at runtime from vm_disks)
# _boot_disk: {}                     # Boot disk config (vm_disks[0]) - always scsi0
# _additional_disks: []              # Additional disks (vm_disks[1:]) - auto-indexed by bus type
# additional_disks_result: {}        # Result from additional disks creation task

# Network & Cloud-Init (Constructed from templates)
# vm_net0_param: ""                  # Constructed --net0 parameter (net0.j2)
# vm_cloudinit_ipconfig: ""          # Constructed --ipconfig0 parameter (ipconfig0.j2)

# VM State (Runtime)
# vm_state: {}                       # State object from validate_state.yml
# vm_exists: false                   # Whether VM already exists (idempotency check)
# discovered_ip: ""                  # Discovered IP address after creation
