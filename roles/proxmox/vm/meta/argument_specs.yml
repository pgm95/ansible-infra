---
# ============================================================================
# VM Role - Argument Specifications
# ============================================================================
# Provides IDE autocompletion and validation for role variables
# Run: ansible-doc -t role roles/proxmox/vm

argument_specs:
  main:
    short_description: Provision Virtual Machines on Proxmox VE
    description:
      - Creates and configures QEMU/KVM virtual machines on Proxmox VE hosts
      - Supports cloud-init for automated OS configuration
      - Handles cloud image download and multi-disk configurations
    author:
      - Your Name

    options:
      # ========================================================================
      # Required Variables
      # ========================================================================
      pve_host:
        description: Target Proxmox host for VM creation
        type: str
        required: true

      vm_vmid:
        description: VM ID (100-999999999)
        type: str
        required: true

      vm_hostname:
        description: VM hostname (Proxmox UI, DNS, SSH, cloud-init)
        type: str
        required: true

      # ========================================================================
      # VM Basics
      # ========================================================================
      vm_description:
        description: VM description shown in Proxmox UI
        type: str
        default: ""

      vm_tags:
        description: "Semicolon-separated tags: tag1;tag2;tag3"
        type: str
        default: ""

      vm_template:
        description: Mark as template (prevents starting)
        type: bool
        default: false

      vm_protection:
        description: Prevent accidental removal
        type: bool
        default: false

      vm_start_on_boot:
        description: Start VM when Proxmox boots
        type: bool
        default: false

      vm_startup_order:
        description: Boot priority (0=any, 1-999=ordered)
        type: int
        default: 0

      vm_pool:
        description: Resource pool assignment
        type: str
        default: ""

      vm_ostype:
        description: "OS type: l24, l26, other, win10, win11, etc."
        type: str
        default: "l26"

      # ========================================================================
      # CPU & Memory
      # ========================================================================
      vm_cores:
        description: Number of CPU cores per socket
        type: int
        default: 2

      vm_sockets:
        description: Number of CPU sockets
        type: int
        default: 1

      vm_cpu_type:
        description: "CPU emulation type: host, kvm64, qemu64, etc."
        type: str
        default: "host"

      vm_memory:
        description: RAM in MiB
        type: int
        default: 2048

      vm_balloon:
        description: Minimum RAM for ballooning (0=disable)
        type: int
        default: 512

      # ========================================================================
      # Storage Configuration
      # ========================================================================
      vm_default_storage:
        description: Default storage pool (empty=auto-select)
        type: str
        default: ""

      vm_scsi_controller:
        description: "SCSI controller type"
        type: str
        default: "virtio-scsi-single"
        choices:
          - lsi
          - lsi53c810
          - megasas
          - pvscsi
          - virtio-scsi-pci
          - virtio-scsi-single

      vm_disks:
        description: |
          Disk configuration list. First disk (index 0) is boot disk (scsi0).
          Additional disks use specified bus type with auto-indexed identifiers.
          Each dict supports: size (int, required), bus (str: scsi/sata/virtio/ide),
          storage (str), cache (str), ssd (bool), discard (str), iothread (bool), backup (bool),
          mp (str: guest mount point for cloud-init disk setup, additional disks only).
        type: list
        elements: dict
        default:
          - size: 32

      # ========================================================================
      # Cloud Image
      # ========================================================================
      vm_cloud_image_enabled:
        description: Enable automatic cloud image download
        type: bool
        default: true

      vm_cloud_image_url:
        description: Full URL to cloud image
        type: str
        default: "https://cdimage.debian.org/images/cloud/trixie/latest/debian-13-genericcloud-amd64.raw"

      vm_cloud_image_cache_dir:
        description: Directory to cache downloaded images
        type: str
        default: "/var/lib/pve/local-btrfs/import"

      # ========================================================================
      # Network Configuration
      # ========================================================================
      vm_net_model:
        description: Network card model
        type: str
        default: "virtio"
        choices:
          - virtio
          - e1000
          - e1000e
          - rtl8139

      vm_net_bridge:
        description: Network bridge on Proxmox host
        type: str
        default: "vmbr0"

      vm_net_vlan:
        description: VLAN tag (empty=untagged)
        type: str
        default: ""

      vm_net_mac:
        description: MAC address (empty=auto-generate)
        type: str
        default: ""

      vm_net_mtu:
        description: MTU size (empty=1500)
        type: str
        default: ""

      vm_net_firewall:
        description: Enable Proxmox firewall
        type: bool
        default: false

      vm_net_link_down:
        description: Start with network link disabled
        type: bool
        default: false

      # ========================================================================
      # Cloud-Init Configuration
      # ========================================================================
      vm_cloudinit_enabled:
        description: Enable cloud-init support
        type: bool
        default: true

      vm_cloudinit_type:
        description: "Cloud-init datasource: nocloud, configdrive2"
        type: str
        default: "nocloud"
        choices:
          - nocloud
          - configdrive2

      vm_cloudinit_user:
        description: Default username created by cloud-init
        type: str
        default: "root"

      vm_cloudinit_password:
        description: User password (from vault)
        type: str
        no_log: true

      # SSH keys: loaded from vault_ssh_authorized_keys (list in vault.yml)

      vm_cloudinit_upgrade:
        description: Run package upgrade on first boot
        type: bool
        default: false

      vm_cloudinit_ip:
        description: "IPv4 config: 'dhcp' or CIDR notation"
        type: str
        default: "dhcp"

      vm_cloudinit_gateway:
        description: IPv4 gateway (required for static IP)
        type: str
        default: ""

      vm_cloudinit_ip6:
        description: "IPv6 config: 'dhcp', 'auto', CIDR, or '' (omit)"
        type: str
        default: ""

      vm_cloudinit_nameserver:
        description: DNS nameserver for cloud-init
        type: str
        default: ""

      vm_cloudinit_searchdomain:
        description: DNS search domain for cloud-init
        type: str
        default: ""

      # ========================================================================
      # Custom Vendor Data
      # ========================================================================
      vm_cicustom_vendor_enabled:
        description: Enable custom vendor.yml for pre-boot config
        type: bool
        default: false

      vm_cicustom_vendor_storage:
        description: Proxmox storage name for vendor file
        type: str
        default: ""

      vm_cicustom_vendor_path:
        description: Path within storage for vendor.yml
        type: str
        default: "snippets"

      # ========================================================================
      # Boot & BIOS
      # ========================================================================
      vm_bios_type:
        description: "BIOS type: seabios (legacy), ovmf (UEFI)"
        type: str
        default: "seabios"
        choices:
          - seabios
          - ovmf

      vm_machine_type:
        description: "QEMU machine type: q35 (modern), i440fx (legacy)"
        type: str
        default: "q35"
        choices:
          - q35
          - i440fx

      vm_boot_order:
        description: Boot device order
        type: str
        default: "scsi0"

      vm_reboot_allowed:
        description: Allow guest-initiated reboot
        type: bool
        default: true

      # ========================================================================
      # Display & Input
      # ========================================================================
      vm_vga_type:
        description: "VGA adapter type"
        type: str
        default: "std"

      vm_keyboard_layout:
        description: Keyboard layout
        type: str
        default: "en-us"

      vm_tablet_enabled:
        description: Enable USB tablet for mouse integration
        type: bool
        default: true

      # ========================================================================
      # Advanced Features
      # ========================================================================
      vm_kvm_enabled:
        description: Enable KVM hardware virtualization
        type: bool
        default: true

      vm_acpi_enabled:
        description: Enable ACPI support
        type: bool
        default: true

      vm_agent_enabled:
        description: Enable QEMU guest agent
        type: bool
        default: true

      vm_hotplug_features:
        description: "Comma-separated hotplug features"
        type: str
        default: "network,disk,usb"

      # ========================================================================
      # Role Operational
      # ========================================================================
      vm_temp_dir:
        description: Directory for temporary files
        type: str
        default: "/root/.ansible/vm"

      vm_start_after_create:
        description: Start VM after creation
        type: bool
        default: true

      vm_wait_for_boot:
        description: Wait for VM to fully boot
        type: bool
        default: true

      vm_ip_discovery_method:
        description: "IP discovery method: dns, agent"
        type: str
        default: "dns"
        choices:
          - dns
          - agent

      vm_ip_discovery_retries:
        description: Number of IP discovery retry attempts
        type: int
        default: 20

      vm_ip_discovery_delay:
        description: Seconds between IP discovery retries
        type: int
        default: 5
