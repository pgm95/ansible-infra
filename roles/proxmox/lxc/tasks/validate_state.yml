---
# ============================================================================
# LXC Role - State Validation with Reconciliation
# ============================================================================
# Uses shared task for reconciliation logic (DRY principle)

- name: LXC | Check container state using shared reconciliation task
  ansible.builtin.include_tasks: "{{ _proxmox_shared_tasks }}/check_resource_state.yml"
  vars:
    _resource_type: lxc
    _hostname: "{{ lxc_hostname }}"
    _vmid: "{{ lxc_vmid }}"

# Map shared output to LXC-specific variable names for backward compatibility
- name: LXC | Set LXC-specific state variables
  ansible.builtin.set_fact:
    lxc_state: "{{ resource_state }}"
    lxc_exists: "{{ resource_state.exists }}"

# Early exit if nothing to do
- name: LXC | Skip if container already exists (reconciled)
  ansible.builtin.meta: end_host
  when: lxc_state.action == 'skip'
