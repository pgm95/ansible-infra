---
# LXC Role - Device Detection (Data-Driven)
# Detects and configures devices for unprivileged containers

# GID Calculation Based on idmap Configuration
- name: LXC | Calculate device GIDs based on idmap configuration
  ansible.builtin.set_fact:
    __device_gids:
      video: "{{ lxc_idmap_gid if (lxc_idmap_gid_match_devices and lxc_idmap_gid) else '44' }}"
      render: "{{ lxc_idmap_gid if (lxc_idmap_gid_match_devices and lxc_idmap_gid) else '104' }}"
      dialout: "{{ lxc_idmap_gid if (lxc_idmap_gid_match_devices and lxc_idmap_gid) else '20' }}"

# Device Configuration Definitions
- name: LXC | Define device detection configuration
  ansible.builtin.set_fact:
    __device_configs:
      - name: LXC | gpu_card
        enabled: "{{ lxc_device_vaapi | bool }}"
        path: /dev/dri
        patterns: ["card*"]
        gid_type: video
      - name: LXC | gpu_render
        enabled: "{{ lxc_device_vaapi | bool }}"
        path: /dev/dri
        patterns: ["renderD*"]
        gid_type: render
      - name: LXC | framebuffer
        enabled: "{{ lxc_device_framebuffer | bool }}"
        path: /dev
        patterns: ["fb0"]
        gid_type: video
      - name: LXC | kfd
        enabled: "{{ lxc_device_kfd | bool }}"
        path: /dev
        patterns: ["kfd"]
        gid_type: render
      - name: LXC | usb_serial
        enabled: "{{ lxc_device_usb_serial | bool }}"
        path: /dev
        patterns: ["ttyUSB*"]
        gid_type: dialout
      - name: LXC | usb_acm
        enabled: "{{ lxc_device_usb_acm | bool }}"
        path: /dev
        patterns: ["ttyACM*"]
        gid_type: dialout

# GPU Directory Check (Required for /dev/dri devices)
- name: LXC | Check if /dev/dri directory exists
  ansible.builtin.stat:
    path: /dev/dri
  register: _dri_directory
  when: lxc_device_vaapi | bool

# Device Detection
- name: LXC | Initialize detected devices list
  ansible.builtin.set_fact:
    __detected_devices: []

- name: LXC | Get enabled device configurations
  ansible.builtin.set_fact:
    _enabled__device_configs: "{{ __device_configs | selectattr('enabled', 'equalto', true) | list }}"

# Detect devices for each enabled configuration
- name: LXC | Find devices matching patterns
  ansible.builtin.find:
    paths: "{{ item.path }}"
    patterns: "{{ item.patterns }}"
    file_type: any
  register: _found_devices_results
  loop: "{{ _enabled__device_configs }}"
  loop_control:
    label: "{{ item.name }}"
  when: >
    item.path != '/dev/dri' or
    (_dri_directory.stat.exists | default(false))

- name: LXC | Build detected devices list with GID assignments
  ansible.builtin.set_fact:
    __detected_devices: >-
      {{ __detected_devices + (item.files | default([])
         | map(attribute='path')
         | map('regex_replace', '^(.*)$', '\1,gid=' ~ __device_gids[_enabled__device_configs[idx].gid_type])
         | list) }}
  loop: "{{ _found_devices_results.results | default([]) }}"
  loop_control:
    index_var: idx
    label: "{{ _enabled__device_configs[idx].name | default('unknown') }}"
  when:
    - item.files is defined
    - item.files | length > 0

# Build Device Arguments for pct create
- name: LXC | Initialize device arguments list
  ansible.builtin.set_fact:
    lxc_dev_args: []

- name: LXC | Build indexed device arguments
  ansible.builtin.set_fact:
    lxc_dev_args: "{{ lxc_dev_args + ['--dev' ~ idx ~ ' ' ~ item] }}"
  loop: "{{ __detected_devices }}"
  loop_control:
    index_var: idx
  when: __detected_devices | length > 0

- name: LXC | Display detected devices summary
  ansible.builtin.debug:
    msg:
      - "Detected {{ __detected_devices | length }} device(s) for passthrough:"
      - "{{ __detected_devices | default([]) }}"
    verbosity: 1
  when: __detected_devices | length > 0
