---
# LXC Role - Pre-Creation Validation
# Validates configuration and environment before container creation

# Common Validation (Shared Task)
- name: LXC | Validate Proxmox environment and pve_host
  ansible.builtin.include_tasks: "{{ _proxmox_shared_tasks }}/validate_common.yml"
  vars:
    _resource_type: "container"

# Identity Validation (Required for ansible_id computation)

- name: LXC | Enforce lxc_hostname is explicitly defined
  ansible.builtin.assert:
    that:
      - lxc_hostname is defined
      - lxc_hostname | string | length > 0
    fail_msg: >-
      lxc_hostname must be explicitly defined in host_vars for ansible_id
      computation (e.g. lxc_hostname: "mycontainer").
    success_msg: "lxc_hostname validated: {{ lxc_hostname }}"

- name: LXC | Enforce lxc_vmid is explicitly defined
  ansible.builtin.assert:
    that:
      - lxc_vmid is defined
      - lxc_vmid | string | length > 0
    fail_msg: >-
      lxc_vmid must be explicitly defined in host_vars -- auto-assignment is
      not allowed. Required for ansible_id computation
      (e.g. lxc_vmid: "300").
    success_msg: "lxc_vmid validated: {{ lxc_vmid }}"

# Compute ansible_id (Shared Task)
- name: LXC | Compute ansible_id using shared task
  ansible.builtin.include_tasks: "{{ _proxmox_shared_tasks }}/compute_ansible_id.yml"
  vars:
    _hostname: "{{ lxc_hostname }}"
    _vmid: "{{ lxc_vmid }}"

# Resource Validation

- name: LXC | Validate required variables
  ansible.builtin.assert:
    that:
      - lxc_cores is defined
      - lxc_cores | int > 0
      - lxc_memory is defined
      - lxc_memory | int >= 128
      - lxc_disks is defined
      - lxc_disks | length > 0
      - lxc_net_bridge is defined
      - lxc_net_bridge | length > 0
      - lxc_os_version is defined
      - lxc_os_version | string | length > 0
    fail_msg: >-
      Required LXC variables are missing or invalid.
      lxc_cores: {{ lxc_cores | default('undefined') }} (must be > 0),
      lxc_memory: {{ lxc_memory | default('undefined') }} (must be >= 128 MiB),
      lxc_disks: must have at least one disk with size defined,
      lxc_net_bridge: {{ lxc_net_bridge | default('undefined') }} (must not be empty),
      lxc_os_version: {{ lxc_os_version | default('undefined') }} (must not be empty).
    success_msg: "Required variables validated"

# Disk Configuration Validation
- name: LXC | Validate root disk (index 0) has required size
  ansible.builtin.assert:
    that:
      - lxc_disks[0].size is defined
      - lxc_disks[0].size | int > 0
    fail_msg: >-
      Root disk (lxc_disks[0]) must have a size > 0,
      got: {{ lxc_disks[0].size | default('undefined') }}.
    success_msg: "Root disk size validated: {{ lxc_disks[0].size }} GiB"

- name: LXC | Validate additional disks have required properties
  ansible.builtin.assert:
    that:
      - item.size is defined
      - item.size | int > 0
      - item.mp is defined
      - item.mp | string | length > 0
      - item.mp is match('^/')
    fail_msg: >-
      Additional disk at index {{ idx + 1 }} is invalid:
      size={{ item.size | default('MISSING') }} (must be > 0),
      mp={{ item.mp | default('MISSING') }} (must start with /).
    success_msg: "Disk {{ idx + 1 }} validated: {{ item.size }} GiB at {{ item.mp }}"
  loop: "{{ lxc_disks[1:] | default([]) }}"
  loop_control:
    index_var: idx
  when: lxc_disks | length > 1

- name: LXC | Validate boolean types
  ansible.builtin.assert:
    that:
      - item.value is boolean
    fail_msg: "Variable '{{ item.key }}' must be a boolean (true/false), got: {{ item.value }}"
    success_msg: "Variable '{{ item.key }}' is a valid boolean"
  loop: "{{ boolean_vars | dict2items }}"
  vars:
    boolean_vars:
      lxc_privileged: "{{ lxc_privileged }}"
      lxc_start_on_boot: "{{ lxc_start_on_boot }}"
      lxc_feature_fuse: "{{ lxc_feature_fuse }}"
      lxc_feature_mknod: "{{ lxc_feature_mknod }}"
      lxc_feature_nesting: "{{ lxc_feature_nesting }}"
      lxc_feature_keyctl: "{{ lxc_feature_keyctl }}"
      lxc_feature_nfs: "{{ lxc_feature_nfs }}"
      lxc_feature_cifs: "{{ lxc_feature_cifs }}"
      lxc_device_tun: "{{ lxc_device_tun }}"
      lxc_device_vaapi: "{{ lxc_device_vaapi }}"
      lxc_device_framebuffer: "{{ lxc_device_framebuffer }}"
      lxc_device_kfd: "{{ lxc_device_kfd }}"
      lxc_device_usb_serial: "{{ lxc_device_usb_serial }}"
      lxc_device_usb_acm: "{{ lxc_device_usb_acm }}"

- name: LXC | Validate numeric variables
  ansible.builtin.assert:
    that:
      - item.value | int >= item.min
      - item.value | int <= item.max
    fail_msg: "Variable '{{ item.key }}' out of range ({{ item.min }}-{{ item.max }}), got: {{ item.value }}"
    success_msg: "Variable '{{ item.key }}' is valid: {{ item.value }}"
  loop:
    - { key: "lxc_cores", value: "{{ lxc_cores }}", min: 1, max: 128 }
    - { key: "lxc_memory", value: "{{ lxc_memory }}", min: 128, max: 524288 }
    - { key: "lxc_swap", value: "{{ lxc_swap }}", min: 0, max: 524288 }

- name: LXC | Validate network configuration
  ansible.builtin.assert:
    that:
      - lxc_net_ipv4_method in ['auto', 'dhcp', 'static', 'none']
    fail_msg: >-
      Invalid lxc_net_ipv4_method: '{{ lxc_net_ipv4_method | default('undefined') }}'.
      Must be one of: auto, dhcp, static, none.
    success_msg: "IPv4 method '{{ lxc_net_ipv4_method }}' is valid"

- name: LXC | Validate static network requirements
  ansible.builtin.assert:
    that:
      - lxc_net_ipv4_static | length > 0
      - lxc_net_ipv4_gateway | length > 0
    fail_msg: >-
      Static IPv4 configuration is incomplete -- both IP and gateway are
      required. Got lxc_net_ipv4_static: {{ lxc_net_ipv4_static | default('undefined') }},
      lxc_net_ipv4_gateway: {{ lxc_net_ipv4_gateway | default('undefined') }}.
    success_msg: "Static IPv4 configuration is valid"
  when: lxc_net_ipv4_method == 'static'

- name: LXC | Check vault SSH keys are available
  ansible.builtin.debug:
    msg: "WARNING: vault_ssh_authorized_keys is not defined or empty — containers will have no SSH access"
  when: vault_ssh_authorized_keys | default([]) | length == 0

- name: LXC | Display validation summary
  ansible.builtin.debug:
    msg:
      - "LXC configuration validated successfully"
      - "Container Identity:"
      - "  - Hostname: {{ lxc_hostname }}"
      - "  - VMID: {{ lxc_vmid }}"
      - "  - ansible_id: {{ ansible_id }} (tag: {{ ansible_id_tag }})"
      - "Container Resources:"
      - "  - Cores: {{ lxc_cores }}"
      - "  - Memory: {{ lxc_memory }} MiB"
      - >-
        - Disks: {{ lxc_disks | length }} (rootfs: {{ lxc_disks[0].size }} GiB{{
        ', +' ~ (lxc_disks | length - 1) ~ ' additional' if lxc_disks | length > 1 else '' }})
      - "  - Network: {{ lxc_net_ipv4_method }} on {{ lxc_net_bridge }}"
      - "  - Privileged: {{ lxc_privileged }}"
    verbosity: 1
