---
# ============================================================================
# LXC Role - Main Task Orchestration
# ============================================================================
#
# Also uses proxmox shared tasks for reconciliation and cleanup operations

- name: LXC | Set shared tasks path
  ansible.builtin.set_fact:
    _proxmox_shared_tasks: "{{ role_path }}/../shared/tasks"

- name: LXC | Container creation workflow
  block:
    # Validation MUST run first to compute ansible_id for reconciliation
    - name: LXC | Validate container configuration and compute ansible_id
      ansible.builtin.include_tasks: validate.yml
      tags: [always]

    # State check uses ansible_id for reconciliation matching
    - name: LXC | Check container state (reconciliation)
      ansible.builtin.include_tasks: validate_state.yml
      tags: [always]

    - name: LXC | Create container
      ansible.builtin.include_tasks: create.yml
      tags: [create]

  rescue:
    - name: LXC | Display error information
      ansible.builtin.debug:
        msg:
          - "Container creation failed"
          - "VMID: {{ lxc_final_vmid | default('N/A') }}"
          - "Hostname: {{ lxc_hostname | default(inventory_hostname) }}"
          - "Error: {{ ansible_failed_result.msg | default('Unknown error') }}"

    - name: LXC | Clean up staged SSH keys on failure
      ansible.builtin.file:
        path: "{{ __lxc_ssh_keys_file }}"
        state: absent
      when: __lxc_ssh_keys_file is defined

    - name: LXC | Cleanup failed container using shared task
      ansible.builtin.include_tasks: "{{ _proxmox_shared_tasks }}/cleanup_failed_resource.yml"
      vars:
        _resource_type: lxc
        _vmid: "{{ lxc_final_vmid }}"
        _resource_exists: "{{ lxc_exists | default(false) }}"

    - name: LXC | Fail with error message
      ansible.builtin.fail:
        msg: "Container creation failed. Check error messages above."
