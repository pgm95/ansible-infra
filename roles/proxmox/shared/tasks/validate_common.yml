---
# Shared Proxmox Task - Common Validation
#
# Validates PVE environment and pve_host configuration.
# Shared between LXC and VM roles to ensure DRY principle.
#
# Required variables:
#   _resource_type: "container" or "VM" (for error messages)
#
# This task validates:
#   1. Proxmox environment (pveversion command)
#   2. pve_host is explicitly defined
#   3. pve_host is a valid member of proxmox group

- name: Validate Proxmox environment
  ansible.builtin.command: pveversion
  register: pve_version
  changed_when: false
  failed_when: pve_version.rc != 0

# PVE Host Validation (Required for multi-PVE support)
# pve_host MUST be explicitly defined and must be a valid Proxmox host.
# This enables targeting specific PVE hosts in multi-node environments.

- name: Enforce pve_host is explicitly defined
  ansible.builtin.assert:
    that:
      - pve_host is defined
      - pve_host | string | length > 0
    fail_msg: >-
      pve_host must be explicitly defined in host_vars to specify which
      Proxmox node to create the {{ _resource_type }} on.
      Available hosts: {{ groups['proxmox'] | default(['pve']) | join(', ') }}.
    success_msg: "pve_host validated: {{ pve_host }}"

- name: Validate pve_host is in proxmox group
  ansible.builtin.assert:
    that:
      - pve_host in groups['proxmox']
    fail_msg: >-
      pve_host '{{ pve_host }}' is not in the [proxmox] inventory group.
      Valid hosts: {{ groups['proxmox'] | join(', ') }}.
    success_msg: "pve_host '{{ pve_host }}' is a valid Proxmox host"
