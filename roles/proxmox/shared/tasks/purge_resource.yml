---
# Shared Proxmox Task - Purge Resource
#
# Removes a VM or LXC container using ansible_id tag for API-based lookup.
# Uses Proxmox API modules for idempotent removal.
#
# Required variables:
#   _resource_type: "lxc" or "vm"
#   _hostname: The resource hostname (lxc_hostname or vm_hostname)
#   _vmid: The resource VMID (lxc_vmid or vm_vmid)
#   pve_host: Target Proxmox node
#   proxmox_api_* variables: API auth (from inventory/group_vars/proxmox.yml)
#
# Optional variables:
#   _purge_vendor_file: true/false (VM only - remove cloud-init vendor file)
#   _vendor_storage: Proxmox storage name for vendor file (required if _purge_vendor_file)
#   _vendor_path: Path within storage (default: "snippets")
#
# Output variables:
#   purge_result: Dictionary with status, changed, matched_by

# Step 0: Validate required input variables
- name: Purge | Validate required variables
  ansible.builtin.assert:
    that:
      - _resource_type is defined
      - _resource_type in ['lxc', 'vm']
      - _hostname is defined
      - _hostname | string | length > 0
      - _vmid is defined
      - _vmid | string | length > 0
    fail_msg: >-
      Invalid purge parameters.
      _resource_type: {{ _resource_type | default('undefined') }} (must be 'lxc' or 'vm'),
      _hostname: {{ _hostname | default('undefined') }} (must be non-empty),
      _vmid: {{ _vmid | default('undefined') }} (must be non-empty).
    quiet: true

# Step 1: Compute ansible_id for tag-based lookup
# Note: _hostname and _vmid are inherited from parent context (no vars block needed)
- name: Purge | Compute ansible_id
  ansible.builtin.include_tasks: compute_ansible_id.yml

# Step 2: Query API for resource with matching ansible_id tag
# Note: Omit 'node' parameter to query all nodes in cluster
- name: Purge | Query resources by ansible_id tag
  community.proxmox.proxmox_vm_info:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_token_id: "{{ proxmox_api_token_id }}"
    api_token_secret: "{{ proxmox_api_token_secret }}"
    validate_certs: "{{ proxmox_api_validate_certs }}"
    type: "{{ 'lxc' if _resource_type == 'lxc' else 'qemu' }}"
  delegate_to: localhost
  register: __purge_query
  failed_when: false
  changed_when: false

- name: Purge | Debug API query result
  ansible.builtin.debug:
    msg:
      - "Query type: {{ 'lxc' if _resource_type == 'lxc' else 'qemu' }}"
      - "Looking for VMID: {{ _vmid }}"
      - "Looking for tag: {{ ansible_id_tag }}"
      - "VMs found: {{ __purge_query.proxmox_vms | default([]) | map(attribute='vmid') | list }}"
      - "API error: {{ __purge_query.msg | default('none') }}"
    verbosity: 1

# Step 3: Find resource matching our ansible_id tag
- name: Purge | Find resource with ansible_id tag
  ansible.builtin.set_fact:
    __target_resource: >-
      {{
        __purge_query.proxmox_vms | default([])
        | selectattr('tags', 'defined')
        | selectattr('tags', 'search', ansible_id_tag)
        | list | first | default(none)
      }}

# Step 4: Fallback - check by VMID if no tag match
- name: Purge | Fallback lookup by VMID
  ansible.builtin.set_fact:
    __target_resource: >-
      {{
        __purge_query.proxmox_vms | default([])
        | selectattr('vmid', 'equalto', _vmid | int)
        | list | first | default(none)
      }}
  when: __target_resource is none

# Step 5: Set target VMID and node for removal
# Note: Extract actual Proxmox node name from API result (pve_host is Ansible inventory name)
- name: Purge | Determine target VMID and node
  ansible.builtin.set_fact:
    __purge_vmid: "{{ __target_resource.vmid | default(none) }}"
    __purge_node: "{{ __target_resource.node | default(none) }}"
    __purge_matched_by: >-
      {{ 'ansible_id_tag' if (__target_resource is not none and ansible_id_tag in (__target_resource.tags | default('')))
         else ('vmid' if __target_resource is not none else 'not_found') }}

# Step 6: Remove LXC container
- name: Purge | Remove LXC container
  community.proxmox.proxmox:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_token_id: "{{ proxmox_api_token_id }}"
    api_token_secret: "{{ proxmox_api_token_secret }}"
    validate_certs: "{{ proxmox_api_validate_certs }}"
    node: "{{ __purge_node }}"
    vmid: "{{ __purge_vmid }}"
    state: absent
    purge: true
    force: true
    timeout: 120
  delegate_to: localhost
  register: __purge_lxc_result
  when:
    - _resource_type == 'lxc'
    - __purge_vmid is not none
    - __purge_node is not none

# Step 7: Remove VM
- name: Purge | Remove VM
  community.proxmox.proxmox_kvm:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_token_id: "{{ proxmox_api_token_id }}"
    api_token_secret: "{{ proxmox_api_token_secret }}"
    validate_certs: "{{ proxmox_api_validate_certs }}"
    node: "{{ __purge_node }}"
    vmid: "{{ __purge_vmid }}"
    state: absent
    force: true
    timeout: 120
  delegate_to: localhost
  register: __purge_vm_result
  when:
    - _resource_type == 'vm'
    - __purge_vmid is not none
    - __purge_node is not none

# Step 8: Remove vendor file (VM only)
- name: Purge | Vendor file cleanup
  when:
    - _resource_type == 'vm'
    - _purge_vendor_file | default(false)
    - _vendor_storage is defined
    - _vendor_storage | length > 0
  block:
    - name: Purge | Validate pve_host for vendor cleanup
      ansible.builtin.assert:
        that:
          - pve_host is defined
          - pve_host | string | length > 0
          - hostvars[pve_host] is defined
        fail_msg: >-
          Cannot cleanup vendor file -- pve_host '{{ pve_host | default('undefined') }}'
          is not defined or not in inventory. Ensure pve_host is set in host_vars
          and corresponds to a valid Proxmox host.
        quiet: true

    - name: Purge | Resolve storage path for vendor file
      ansible.builtin.shell: |
        set -o pipefail
        pvesm path {{ _vendor_storage }}:{{ _vendor_path | default('snippets') }}/test.yml | sed 's|/{{ _vendor_path | default('snippets') }}/test.yml||'
      args:
        executable: /bin/bash
      delegate_to: "{{ pve_host }}"
      register: __vendor_storage_path
      changed_when: false
      failed_when: false

    - name: Purge | Remove vendor cloud-init file
      ansible.builtin.file:
        path: "{{ __vendor_storage_path.stdout }}/{{ _vendor_path | default('snippets') }}/vendor-{{ _hostname }}.yml"
        state: absent
      delegate_to: "{{ pve_host }}"
      when:
        - __vendor_storage_path.stdout is defined
        - __vendor_storage_path.stdout | length > 0

# Step 9: Set output facts
- name: Purge | Set result facts
  ansible.builtin.set_fact:
    purge_result:
      hostname: "{{ _hostname }}"
      vmid: "{{ _vmid }}"
      ansible_id: "{{ ansible_id }}"
      matched_by: "{{ __purge_matched_by }}"
      found: "{{ __purge_vmid is not none }}"
      changed: "{{ (__purge_lxc_result.changed | default(false)) or (__purge_vm_result.changed | default(false)) }}"
      actual_vmid: "{{ __purge_vmid | default('N/A') }}"

# Step 10: Display result
- name: Purge | Display result
  ansible.builtin.debug:
    msg: >-
      {{ _resource_type | upper }} {{ _hostname }} (VMID: {{ _vmid }}):
      {{ 'destroyed' if purge_result.changed else ('already absent' if not purge_result.found else 'no change') }}
      (matched by: {{ purge_result.matched_by }})
