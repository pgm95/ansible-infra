---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe] # Allow Jinja2 templating
        exclude: ^\.secrets/
      - id: check-added-large-files
      - id: detect-private-key
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: ansible-lint
        name: ansible-lint
        entry: ansible-lint -c .config/ansible-lint.yml
        language: system
        types: [yaml]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.31.0
    hooks:
      - id: check-jsonschema
        name: validate json schemas
        files: ^schemas/.*\.json$
        args: [--check-metaschema]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.20.0
    hooks:
      - id: markdownlint-cli2
        args: [--config, .config/.markdownlint-cli2.jsonc, --fix]

  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-lint

  - repo: local
    hooks:
      - id: check-secrets-encrypted
        name: Check secrets are SOPS-encrypted
        entry: >-
          sh -c 'for f in "$@"; do grep -q "^sops:" "$f" ||
          { echo "PLAINTEXT: $f"; exit 1; }; done' --
        language: system
        files: ^\.secrets/.*\.sops\.yaml$
