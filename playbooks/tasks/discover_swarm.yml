---
# ============================================================================
# Discover Swarm-Enabled Hosts
# ============================================================================
# Finds hosts with docker_swarm_enabled: true across host_vars
# Registers them to the 'swarm' group with variables loaded via include_vars
#
# Two-phase approach:
#   Phase 1: Register all candidates and load their variables
#   Phase 2: Filter, validate, sort, and register swarm-enabled hosts
#
# Required variables (from group_vars):
#   - proxmox_dns_domain: DNS domain for host resolution
# ============================================================================

# ============================================================================
# Phase 1: Discover Candidates and Load Variables
# ============================================================================

- name: Find LXC host definition files
  ansible.builtin.find:
    paths: "{{ inventory_dir }}/host_vars/lxc"
    patterns: "*.yml"
    file_type: file
  register: _lxc_files
  failed_when: false

- name: Find VM host definition files
  ansible.builtin.find:
    paths: "{{ inventory_dir }}/host_vars/vm"
    patterns: "*.yml"
    file_type: file
  register: _vm_files
  failed_when: false

- name: Find static host definition files
  ansible.builtin.find:
    paths: "{{ inventory_dir }}/host_vars"
    patterns: "*.yml"
    file_type: file
    recurse: false
  register: _static_files
  failed_when: false

- name: Combine all host definition files
  ansible.builtin.set_fact:
    _all_host_files: >-
      {{ (_lxc_files.files | default([])) +
         (_vm_files.files | default([])) +
         (_static_files.files | default([])) }}

- name: Build candidate metadata
  ansible.builtin.set_fact:
    _all_candidates: >-
      {{ _all_candidates | default([]) + [{
           'name': item.path | basename | regex_replace('\.yml$', ''),
           'path': item.path,
           'type': 'lxc' if '/lxc/' in item.path else ('vm' if '/vm/' in item.path else 'vps')
         }] }}
  loop: "{{ _all_host_files }}"
  loop_control:
    label: "{{ item.path | basename }}"

- name: Register candidates for variable loading
  ansible.builtin.add_host:
    name: "{{ item.name }}"
    groups: _swarm_candidates
    ansible_host: >-
      {{ (hostvars[item.name].ansible_host | default(none) if item.name in hostvars else none)
         or (item.name ~ '.' ~ proxmox_dns_domain) }}
  loop: "{{ _all_candidates | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when: _all_candidates | default([]) | length > 0

- name: Load candidate host variables
  ansible.builtin.include_vars:
    file: "{{ item.path }}"
  delegate_to: "{{ item.name }}"
  delegate_facts: true
  loop: "{{ _all_candidates | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when: _all_candidates | default([]) | length > 0

# ============================================================================
# Phase 2: Filter, Validate, Sort, and Register Swarm Hosts
# ============================================================================

- name: Filter swarm-enabled hosts
  ansible.builtin.set_fact:
    _swarm_hosts: >-
      {{ _swarm_hosts | default([]) + (
           [item] if (hostvars[item.name].docker_swarm_enabled | default(false)) else []
         ) }}
  loop: "{{ _all_candidates | default([]) }}"
  loop_control:
    label: "{{ item.name }}"

- name: Display discovered swarm hosts
  ansible.builtin.debug:
    msg: |
      Discovered {{ _swarm_hosts | default([]) | length }} swarm host(s):
      {% for host in _swarm_hosts | default([]) %}
      {% set role = hostvars[host.name].docker_swarm_role | default('worker') %}
      {% set init = ' [INIT]' if hostvars[host.name].docker_swarm_init | default(false) else '' %}
        - {{ host.name }} ({{ host.type }}, {{ role }}{{ init }})
      {% endfor %}
  when: _swarm_hosts | default([]) | length > 0

- name: No swarm hosts found
  ansible.builtin.debug:
    msg: |
      No hosts found with docker_swarm_enabled: true
      Add docker_swarm_enabled: true to the host's host_vars file
  when: _swarm_hosts | default([]) | length == 0

- name: Identify init node
  ansible.builtin.set_fact:
    _init_hosts: >-
      {{ _init_hosts | default([]) + (
           [item] if (hostvars[item.name].docker_swarm_init | default(false)) else []
         ) }}
  loop: "{{ _swarm_hosts | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when: _swarm_hosts | default([]) | length > 0

- name: Validate exactly one init node exists
  ansible.builtin.assert:
    that:
      - _init_hosts | length == 1
    fail_msg: |
      Exactly ONE host must have docker_swarm_init: true
      Found: {{ _init_hosts | length }}
    success_msg: "Init node: {{ _init_hosts[0].name }}"
  when: _swarm_hosts | default([]) | length > 0

- name: Validate init node is a manager
  ansible.builtin.assert:
    that:
      - hostvars[_init_hosts[0].name].docker_swarm_role | default('worker') == 'manager'
    fail_msg: >-
      Init node must be a manager.
      {{ _init_hosts[0].name }} has docker_swarm_init: true
      but docker_swarm_role: {{ hostvars[_init_hosts[0].name].docker_swarm_role | default('worker') }}.
      Set docker_swarm_role: manager on the init node in host_vars.
    success_msg: "Init node {{ _init_hosts[0].name }} is a manager"
  when: _swarm_hosts | default([]) | length > 0

- name: Count managers
  ansible.builtin.set_fact:
    _manager_count: >-
      {{ _swarm_hosts | default([])
         | map(attribute='name')
         | map('extract', hostvars, 'docker_swarm_role')
         | map('default', 'worker')
         | select('equalto', 'manager')
         | list | length }}
  when: _swarm_hosts | default([]) | length > 0

- name: Validate at least one manager exists
  ansible.builtin.assert:
    that:
      - _manager_count | int >= 1
    fail_msg: "At least one host must have docker_swarm_role: manager"
    success_msg: "Manager count: {{ _manager_count }}"
  when: _swarm_hosts | default([]) | length > 0

- name: Store init node reference on localhost
  ansible.builtin.set_fact:
    swarm_init_host: "{{ _init_hosts[0].name }}"
  when: _swarm_hosts | default([]) | length > 0

- name: Sort hosts for bootstrap order (init first)
  ansible.builtin.set_fact:
    _swarm_hosts_sorted: >-
      {{ _init_hosts +
         (_swarm_hosts | rejectattr('name', 'equalto', _init_hosts[0].name) | list) }}
  when: _swarm_hosts | default([]) | length > 0

- name: Register swarm hosts dynamically
  ansible.builtin.add_host:
    name: "{{ item.name }}"
    groups: swarm
    ansible_host: >-
      {{ hostvars[item.name].ansible_host | default(none)
         or (item.name ~ '.' ~ proxmox_dns_domain) }}
    _swarm_init_host: "{{ _init_hosts[0].name }}"
  loop: "{{ _swarm_hosts_sorted | default([]) }}"
  loop_control:
    label: "{{ item.name }} ({{ hostvars[item.name].docker_swarm_role | default('worker') }})"
  when: _swarm_hosts_sorted | default([]) | length > 0

- name: Display summary
  ansible.builtin.debug:
    msg: |
      Swarm group populated: {{ groups['swarm'] | default([]) | join(', ') }}
      Init node: {{ swarm_init_host }}
      Managers: {{ _manager_count }}
      Workers: {{ (_swarm_hosts | length) - (_manager_count | int) }}
  when: _swarm_hosts | default([]) | length > 0
