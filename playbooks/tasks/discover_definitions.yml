---
# ============================================================================
# Shared Playbook Task - Discover Proxmox Resource Definitions
# ============================================================================
# Discovers VM or LXC definitions from host_vars and registers them dynamically
#
# Two-phase approach:
#   Phase 1: Register all candidates and load their variables
#   Phase 2: Filter by env_scope and register to the target group
#
# Required variables:
#   _resource_type: "lxc" or "vm"
#   _host_vars_subdir: Subdirectory name (e.g., "lxc" or "vm")
#   _group_name: Primary group name (e.g., "lxc" or "vm")
#   _hostname_var: Variable name for hostname (e.g., "lxc_hostname" or "vm_hostname")
#   proxmox_dns_domain: DNS domain for SSH connections

# ============================================================================
# Phase 1: Discover Candidates and Load Variables
# ============================================================================

- name: Find definition files
  ansible.builtin.find:
    paths: "{{ inventory_dir }}/host_vars/{{ _host_vars_subdir }}"
    patterns: "*.yml"
  register: _definition_files

- name: Register candidates for variable loading
  ansible.builtin.add_host:
    name: "{{ _host_name }}"
    groups: _definition_candidates
    ansible_host: "{{ _host_name }}.{{ proxmox_dns_domain }}"
    _inventory_dir: "{{ inventory_dir }}"
  loop: "{{ _definition_files.files }}"
  loop_control:
    label: "{{ _host_name }}"
  vars:
    _host_name: "{{ item.path | basename | regex_replace('\\.yml$', '') }}"
  when: _definition_files.files | length > 0

- name: Load host-specific variables
  ansible.builtin.include_vars:
    file: "{{ item.path }}"
  delegate_to: "{{ item.path | basename | regex_replace('\\.yml$', '') }}"
  delegate_facts: true
  loop: "{{ _definition_files.files }}"
  loop_control:
    label: "{{ item.path | basename | regex_replace('\\.yml$', '') }}"
  when: _definition_files.files | length > 0

# ============================================================================
# Phase 2: Filter by Environment and Register to Target Group
# ============================================================================

- name: Register resources dynamically
  ansible.builtin.add_host:
    name: "{{ _host_name }}"
    groups:
      - "{{ _group_name }}"
    ansible_host: "{{ _host_name }}.{{ proxmox_dns_domain }}"
    _inventory_dir: "{{ inventory_dir }}"
  loop: "{{ _definition_files.files }}"
  loop_control:
    label: "{{ _host_name }}"
  vars:
    _host_name: "{{ item.path | basename | regex_replace('\\.yml$', '') }}"
  when:
    - _definition_files.files | length > 0
    - hostvars[_host_name].env_scope | default(lookup('env', 'MISE_ENV')) == lookup('env', 'MISE_ENV')

- name: Display discovered resources
  ansible.builtin.debug:
    msg: >-
      Discovered {{ groups[_group_name] | default([]) | length }} {{ _resource_type | upper }}(s)
      for {{ lookup('env', 'MISE_ENV') }} environment:
      {{ groups[_group_name] | default([]) | join(', ') }}

- name: Add hosts to their target PVE group
  ansible.builtin.group_by:
    key: "{{ hostvars[_host_name].pve_host }}"
  loop: "{{ groups[_group_name] | default([]) }}"
  loop_control:
    label: "{{ _host_name }}"
  vars:
    _host_name: "{{ item }}"
  when: groups[_group_name] | default([]) | length > 0

- name: No definitions found warning
  ansible.builtin.debug:
    msg: "No {{ _resource_type }} definitions found in {{ inventory_dir }}/host_vars/{{ _host_vars_subdir }}/"
  when: _definition_files.files | length == 0
