---
# ============================================================================
# Proxmox Group - API Configuration
# ============================================================================
# VMs/LXCs only need to define pve_host - credentials are inherited.
# Per-host secrets defined in inventory/{env}/host_vars/{pve_host}.yml

# API Host (derived from pve_host at runtime)
proxmox_api_host: "{{ hostvars[pve_host].ansible_host }}"

# Token Authentication (ansible@pve) - used for most API operations
proxmox_api_user: "ansible@pve"
proxmox_api_token_id: "homeops"
proxmox_api_token_secret: "{{ vault_proxmox_token_secret }}"

# Password Authentication (root@pam) - required for disk import/resize operations
# The proxmox_disk module does NOT support token auth for these operations.
proxmox_api_password: "{{ vault_universal_pass }}"

# Connection Settings
proxmox_api_validate_certs: false
proxmox_timeout: 30
